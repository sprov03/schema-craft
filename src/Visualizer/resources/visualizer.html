        function loadStatusData() {
            document.getElementById('status-list').innerHTML = '<div style="padding:24px;color:var(--text-muted);text-align:center;">Loading status...</div>';
            fetch('/_schema-craft/api/status')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    statusData = data;
                    renderStatusData();
                })
                .catch(function(e) {
                    document.getElementById('status-list').innerHTML = '<div style="padding:24px;color:var(--error);">Failed to load status: ' + escapeHtml(e.message) + '</div>';
                });
        }

        function renderStatusData() {
            if (!statusData) return;
            var s = statusData.summary;
            document.getElementById('status-in-sync').textContent = s.inSync;
            document.getElementById('status-changes').textContent = s.hasChanges;
            document.getElementById('status-new').textContent = s.newTables;
            document.getElementById('status-total').textContent = s.total + ' schema(s) discovered';

            var hasActionable = s.hasChanges > 0 || s.newTables > 0;
            document.getElementById('status-generate-all').disabled = !hasActionable;
            document.getElementById('status-generate-run').disabled = !hasActionable;

            var listEl = document.getElementById('status-list');
            if (!statusData.schemas || statusData.schemas.length === 0) {
                listEl.innerHTML = '<div style="padding:24px;color:var(--text-muted);text-align:center;">No schemas discovered.</div>';
                return;
            }

            var html = '';
            statusData.schemas.forEach(function(item, idx) {
                var dotClass = item.status === 'in_sync' ? 'synced' : item.status === 'new_table' ? 'new-table' : 'changed';
                var statusLabel = item.status === 'in_sync' ? 'In Sync' : item.status === 'new_table' ? 'New Table' : 'Has Changes';
                var changeSummary = '';

                if (item.diff) {
                    var parts = [];
                    var adds = item.diff.columns.filter(function(c) { return c.action === 'add'; }).length;
                    var mods = item.diff.columns.filter(function(c) { return c.action === 'modify'; }).length;
                    var drops = item.diff.columns.filter(function(c) { return c.action === 'drop'; }).length;
                    var renames = item.diff.columns.filter(function(c) { return c.action === 'rename'; }).length;
                    if (adds) parts.push('+' + adds + ' col');
                    if (mods) parts.push('~' + mods + ' col');
                    if (drops) parts.push('-' + drops + ' col');
                    if (renames) parts.push(renames + ' rename');
                    if (item.diff.indexes.length) parts.push(item.diff.indexes.length + ' idx');
                    if (item.diff.foreignKeys.length) parts.push(item.diff.foreignKeys.length + ' fk');
                    if (item.diff.addTimestamps) parts.push('+timestamps');
                    if (item.diff.dropTimestamps) parts.push('-timestamps');
                    if (item.diff.addSoftDeletes) parts.push('+softDeletes');
                    if (item.diff.dropSoftDeletes) parts.push('-softDeletes');
                    changeSummary = parts.join(', ');
                }

                var isExpandable = item.status !== 'in_sync';
                html += '<div class="sc-status-item" data-status-idx="' + idx + '">' +
                    '<div class="sc-status-row" ' + (isExpandable ? 'style="cursor:pointer;" onclick="window._toggleStatusItem(' + idx + ')"' : '') + '>' +
                        '<span class="sc-status-dot ' + dotClass + '"></span>' +
                        '<span class="sc-status-table">' + escapeHtml(item.tableName) + '</span>' +
                        '<span class="sc-status-schema">' + escapeHtml(shortName(item.schemaClass)) + '</span>' +
                        (changeSummary ? '<span class="sc-status-summary">' + escapeHtml(changeSummary) + '</span>' : '<span class="sc-status-summary">' + escapeHtml(statusLabel) + '</span>') +
                        (isExpandable ? '<span class="sc-status-arrow" id="status-arrow-' + idx + '">&#9654;</span>' : '') +
                    '</div>';

                if (item.diff) {
                    html += '<div class="sc-diff-detail" id="status-diff-' + idx + '">';
                    html += renderDiffDetail(item.diff);
                    html += '</div>';
                    html += '<div class="sc-status-item-actions" id="status-actions-' + idx + '">' +
                        '<button class="sc-btn sm primary" onclick="window._migrateTable(\'' + escapeAttr(item.tableName) + '\')">Generate Migration</button>' +
                    '</div>';
                }

                html += '</div>';
            });

            listEl.innerHTML = html;
        }

        window._toggleStatusItem = function(idx) {
            var diff = document.getElementById('status-diff-' + idx);
            var arrow = document.getElementById('status-arrow-' + idx);
            var actions = document.getElementById('status-actions-' + idx);
            if (diff) {
                diff.classList.toggle('open');
                if (arrow) arrow.classList.toggle('open');
                if (actions) actions.classList.toggle('open');
            }
        };

        function renderDiffDetail(diff) {
            var html = '';

            if (diff.columns.length > 0) {
                html += '<div class="sc-diff-section">' +
                    '<div class="sc-diff-section-title">Columns</div>';
                diff.columns.forEach(function(col) {
                    var actionSymbol = col.action === 'add' ? '+' : col.action === 'drop' ? '-' : col.action === 'rename' ? 'R' : '~';
                    var meta = '';
                    if (col.action === 'rename') {
                        meta = col.oldColumn + ' \u2192 ' + col.column;
                    } else if (col.action === 'modify' && col.desired && col.actual) {
                        var changes = [];
                        if (col.desired.type !== col.actual.type) changes.push(col.actual.type + ' \u2192 ' + col.desired.type);
                        if (col.desired.nullable !== col.actual.nullable) changes.push(col.desired.nullable ? 'nullable' : 'not null');
                        if (col.desired.unsigned !== col.actual.unsigned) changes.push(col.desired.unsigned ? 'unsigned' : 'signed');
                        meta = changes.join(', ');
                    } else if (col.action === 'add' && col.desired) {
                        meta = col.desired.type + (col.desired.nullable ? ', nullable' : '') + (col.desired.unsigned ? ', unsigned' : '');
                    } else if (col.action === 'drop' && col.actual) {
                        meta = col.actual.type;
                    }

                    html += '<div class="sc-diff-row">' +
                        '<span class="sc-diff-action ' + col.action + '">' + actionSymbol + '</span>' +
                        '<span>' + escapeHtml(col.column) + '</span>' +
                        (meta ? '<span class="sc-diff-meta">' + escapeHtml(meta) + '</span>' : '') +
                    '</div>';
                });
                html += '</div>';
            }

            if (diff.indexes.length > 0) {
                html += '<div class="sc-diff-section">' +
                    '<div class="sc-diff-section-title">Indexes</div>';
                diff.indexes.forEach(function(idx) {
                    var symbol = idx.action === 'add' ? '+' : '-';
                    var desc = (idx.unique ? 'unique ' : '') + idx.columns.join(', ');
                    html += '<div class="sc-diff-row">' +
                        '<span class="sc-diff-action ' + idx.action + '">' + symbol + '</span>' +
                        '<span>' + escapeHtml(desc) + '</span>' +
                    '</div>';
                });
                html += '</div>';
            }

            if (diff.foreignKeys.length > 0) {
                html += '<div class="sc-diff-section">' +
                    '<div class="sc-diff-section-title">Foreign Keys</div>';
                diff.foreignKeys.forEach(function(fk) {
                    var symbol = fk.action === 'add' ? '+' : '-';
                    var desc = fk.column + ' \u2192 ' + fk.foreignTable + '.' + fk.foreignColumn;
                    html += '<div class="sc-diff-row">' +
                        '<span class="sc-diff-action ' + fk.action + '">' + symbol + '</span>' +
                        '<span>' + escapeHtml(desc) + '</span>' +
                    '</div>';
                });
                html += '</div>';
            }

            var flags = [];
            if (diff.addTimestamps) flags.push('+timestamps');
            if (diff.dropTimestamps) flags.push('-timestamps');
            if (diff.addSoftDeletes) flags.push('+softDeletes');
            if (diff.dropSoftDeletes) flags.push('-softDeletes');
            if (flags.length > 0) {
                html += '<div class="sc-diff-section">' +
                    '<div class="sc-diff-section-title">Flags</div>' +
                    '<div class="sc-diff-row"><span>' + escapeHtml(flags.join(', ')) + '</span></div>' +
                '</div>';
            }

            return html;
        }

            overlay.dataset.epModalId = modalId;

            overlay.innerHTML =

                    '</div>' +
                    '<div class="ep-body" id="' + bodyId + '">' + requestContent + '</div>' +
                '</div>';

            document.body.appendChild(overlay);
            bindRelationshipLinks(overlay);

            var tabContents = { request: requestContent, response: responseContent };

            // Tab switching
            overlay.querySelectorAll('.ep-tab').forEach(function(tab) {
                tab.addEventListener('click', function() {
                    overlay.querySelectorAll('.ep-tab').forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    var body = document.getElementById(bodyId);
                    body.innerHTML = tabContents[tab.dataset.epTab];
                    bindRelationshipLinks(overlay);
                });
            });

            // Close — only this modal
            function close() { overlay.remove(); }
            overlay.querySelector('.ep-close-btn').addEventListener('click', close);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
            document.addEventListener('keydown', function onEsc(e) {
                if (e.key === 'Escape') {
                    // Close the topmost modal
                    var topOverlay = document.querySelector('.ep-overlay[data-ep-modal-id="' + modalId + '"]');

        function showResourceDetailModal(schemaClass, breadcrumb) {
            var modalId = ++epModalCounter;
            var overlay = document.createElement('div');
            overlay.className = 'ep-overlay';
            overlay.style.zIndex = 9000 + modalId;
            overlay.dataset.epModalId = modalId;

            var bodyId = 'ep-body-' + modalId;

            overlay.innerHTML =
                '<div class="ep-modal">' +
                    '<div class="ep-header">' +
                        '<span class="ep-header-path" style="font-weight:700;">Loading...</span>' +
                        '<button class="ep-header-close ep-close-btn">&times;</button>' +
                    '</div>' +
                    '<div class="ep-body" id="' + bodyId + '">' +
                        '<div class="ep-no-body" style="text-align:center;padding:40px;">Loading resource...</div>' +
                    '</div>' +
                '</div>';

            document.body.appendChild(overlay);

            function close() { overlay.remove(); }
            overlay.querySelector('.ep-close-btn').addEventListener('click', close);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
            document.addEventListener('keydown', function onEsc(e) {
                if (e.key === 'Escape') {
                    var topOverlay = document.querySelector('.ep-overlay[data-ep-modal-id="' + modalId + '"]');
                    if (topOverlay) { topOverlay.remove(); document.removeEventListener('keydown', onEsc); }
                }
            });

            fetch('/_schema-craft/api/generate/resource-detail?schema=' + encodeURIComponent(schemaClass))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success === false) {
                        document.getElementById(bodyId).innerHTML =
                            '<div class="ep-no-body" style="text-align:center;padding:40px;">' + escapeHtml(data.message || 'Not found.') + '</div>';
                        return;
                    }

                    // Update header
                    var headerPath = overlay.querySelector('.ep-header-path');
                    headerPath.textContent = data.modelName + ' Resource';

                    // Build breadcrumb
                    var breadcrumbHtml = '';
                    if (breadcrumb && breadcrumb.length > 0) {
                        breadcrumbHtml = '<div class="ep-breadcrumb">';
                        breadcrumb.forEach(function(b, i) {
                            if (i > 0) breadcrumbHtml += '<span class="ep-breadcrumb-sep">\u203A</span>';
                            breadcrumbHtml += '<span class="ep-breadcrumb-item">' + escapeHtml(b) + '</span>';
                        });
                        breadcrumbHtml += '<span class="ep-breadcrumb-sep">\u203A</span>';
                        breadcrumbHtml += '<span class="ep-breadcrumb-item" style="color:var(--text-primary);font-weight:500;">' + escapeHtml(data.modelName) + '</span>';
                        breadcrumbHtml += '</div>';
                    }

                    // Build content with fields + relationships
                    var content = breadcrumbHtml;
                    content += buildResponseFieldsHtml(data.fields, false);

                    if (data.relationships && data.relationships.length) {
                        content += buildRelationshipsHtml(data.relationships, breadcrumb.concat([data.modelName]));
                    }

                    document.getElementById(bodyId).innerHTML = content;
                    bindRelationshipLinks(overlay);
                })
                .catch(function(e) {
                    document.getElementById(bodyId).innerHTML =
                        '<div class="ep-no-body" style="text-align:center;padding:40px;">Error: ' + escapeHtml(e.message) + '</div>';
                });
        }

        function buildRelationshipsHtml(relationships, breadcrumb) {
            if (!relationships || !relationships.length) return '';

            var relRows = '';
            relationships.forEach(function(r) {
                var modelCell;
                if (r.relatedSchema) {
                    modelCell = '<a class="ep-rel-link" data-rel-schema="' + escapeAttr(r.relatedSchema) +
                        '" data-rel-breadcrumb="' + escapeAttr(JSON.stringify(breadcrumb || [])) + '">' +
                        escapeHtml(r.relatedModel) + '</a>';
                } else {
                    modelCell = '<span class="ep-field-type">' + escapeHtml(r.relatedModel) + '</span>';
                }
                relRows += '<tr>' +
                    '<td><span class="ep-field-name">' + escapeHtml(r.name) + '</span></td>' +
                    '<td>' + escapeHtml(r.type) + '</td>' +
                    '<td>' + modelCell + '</td>' +
                '</tr>';
            });

            return '<div class="ep-section">' +
                '<div class="ep-section-title"><span class="ep-section-badge relations">Relationships</span></div>' +
                '<table class="ep-field-table"><thead><tr><th>Name</th><th>Type</th><th>Related Model</th></tr></thead><tbody>' + relRows + '</tbody></table>' +
            '</div>';
        }

        function bindRelationshipLinks(container) {
            container.querySelectorAll('.ep-rel-link[data-rel-schema]').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var schema = link.dataset.relSchema;
                    var breadcrumb = [];
                    try { breadcrumb = JSON.parse(link.dataset.relBreadcrumb); } catch (ex) {}
                    showResourceDetailModal(schema, breadcrumb);
                });
            });
        }

        function buildRequestTab(ep, stackData) {
            var html = '';

            // URL params
            if (ep.path.indexOf('{') !== -1) {
                html += '<div class="ep-section">' +
                    '<div class="ep-section-title"><span class="ep-section-badge params">URL Parameters</span></div>' +
                    '<table class="ep-field-table"><thead><tr><th>Parameter</th><th>Type</th></tr></thead><tbody>';
                var paramMatches = ep.path.match(/\{(\w+)\}/g) || [];
                paramMatches.forEach(function(p) {
                    var paramName = p.replace(/[{}]/g, '');
                    html += '<tr>' +
                        '<td><span class="ep-field-name">' + escapeHtml(paramName) + '</span></td>' +
                        '<td><span class="ep-field-type">integer | string</span></td>' +
                    '</tr>';
                });
                html += '</tbody></table></div>';
            }

            // Request body
            if (ep.action === 'create' || ep.action === 'update') {
                html += buildRequestBodyHtml(stackData.editableFields);
            } else if (ep.method === 'PUT' && ep.type === 'custom') {
                html += '<div class="ep-section">' +
                    '<div class="ep-section-title"><span class="ep-section-badge body">Request Body</span> application/json</div>' +
                    '<div class="ep-no-body">Custom request class — edit the generated request to add validation rules.</div>' +
                '</div>';
            } else if (ep.action === 'getCollection') {
                html += '<div class="ep-section">' +
                    '<div class="ep-section-title"><span class="ep-section-badge params">Query Parameters</span></div>' +
                    '<table class="ep-field-table"><thead><tr><th>Param</th><th>Type</th><th>Default</th></tr></thead><tbody>' +
                    '<tr><td><span class="ep-field-name">page</span></td><td><span class="ep-field-type">integer</span></td><td>1</td></tr>' +
                    '<tr><td><span class="ep-field-name">per_page</span></td><td><span class="ep-field-type">integer</span></td><td>15</td></tr>' +
                    '</tbody></table></div>';
            } else if (ep.action === 'get') {
                html += '<div class="ep-section">' +
                    '<div class="ep-no-body">No request body — resource identified by URL parameter.</div>' +
                '</div>';
            } else if (ep.action === 'delete') {
                html += '<div class="ep-section">' +
                    '<div class="ep-no-body">No request body — resource identified by URL parameter.</div>' +
                '</div>';
            }

            if (!html) {
                html = '<div class="ep-no-body">No request data for this endpoint.</div>';
            }

            return html;
        }

        function buildResponseTab(ep, stackData, breadcrumb) {
            var html = '';

            if (ep.action === 'delete') {
                html += '<div class="ep-section">' +
                    '<div class="ep-section-title"><span class="ep-section-badge meta">204 No Content</span></div>' +
                    '<div class="ep-no-body">Empty response body on successful deletion.</div>' +
                '</div>';
                return html;
            }

            var isPaginated = ep.action === 'getCollection';

            // Response fields
            html += buildResponseFieldsHtml(stackData.fields, isPaginated);

            // Relationships (clickable)
            html += buildRelationshipsHtml(stackData.relationships, breadcrumb || []);

            return html;
        }

        function buildRequestBodyHtml(editableFields) {
            if (!editableFields || !editableFields.length) {
                return '<div class="ep-section">' +
                    '<div class="ep-section-title"><span class="ep-section-badge body">Request Body</span> application/json</div>' +
                    '<div class="ep-no-body">No editable fields.</div>' +
                '</div>';
            }

            var rows = '';
            editableFields.forEach(function(f) {
                var ruleTags = '';
                if (f.rules) {
                    f.rules.split('|').forEach(function(r) {
                        var cls = 'ep-rule-tag';
                        if (r === 'required') cls += ' required';
                        if (r === 'nullable') cls += ' nullable';
                        ruleTags += '<span class="' + cls + '">' + escapeHtml(r) + '</span>';
                    });
                }
                rows += '<tr>' +
                    '<td><span class="ep-field-name">' + escapeHtml(f.name) + '</span></td>' +
                    '<td><span class="ep-field-type">' + escapeHtml(f.type) + '</span></td>' +
                    '<td class="ep-field-rules">' + ruleTags + '</td>' +
                '</tr>';
            });

            return '<div class="ep-section">' +
                '<div class="ep-section-title"><span class="ep-section-badge body">Request Body</span> application/json</div>' +
                '<table class="ep-field-table"><thead><tr><th>Field</th><th>Type</th><th>Validation</th></tr></thead><tbody>' + rows + '</tbody></table>' +
            '</div>';
        }

        function buildResponseFieldsHtml(fields, isPaginated) {
            if (!fields || !fields.length) {
                return '<div class="ep-section">' +
                    '<div class="ep-section-title"><span class="ep-section-badge fields">Response Fields</span></div>' +
                    '<div class="ep-no-body">No fields found.</div>' +
                '</div>';
            }

            var rows = '';
            fields.forEach(function(f) {
                var flags = '';
                if (f.primary) flags += '<span class="ep-field-flag pk">PK</span>';
                if (f.autoIncrement) flags += '<span class="ep-field-flag ai">AI</span>';
                if (f.unique) flags += '<span class="ep-field-flag unique">unique</span>';
                if (f.unsigned) flags += '<span class="ep-field-flag unsigned">unsigned</span>';

                var typeStr = f.type;
                if (f.length) typeStr += '(' + f.length + ')';
                else if (f.precision) typeStr += '(' + f.precision + (f.scale !== undefined ? ',' + f.scale : '') + ')';

                var nullStr = f.nullable ? '<span class="ep-field-nullable">nullable</span>' : '';

                rows += '<tr>' +
                    '<td><span class="ep-field-name">' + escapeHtml(f.name) + '</span></td>' +
                    '<td><span class="ep-field-type">' + escapeHtml(typeStr) + '</span> ' + nullStr + '</td>' +
                    '<td><div class="ep-field-flags">' + flags + '</div></td>' +
                '</tr>';
            });

            var subtitle = isPaginated ? '200 OK — paginated' : '200 OK';

            return '<div class="ep-section">' +
                '<div class="ep-section-title"><span class="ep-section-badge fields">Response Fields</span> ' + subtitle + '</div>' +
                '<table class="ep-field-table"><thead><tr><th>Field</th><th>Type</th><th>Flags</th></tr></thead><tbody>' + rows + '</tbody></table>' +
            '</div>';
        }

                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    showToast('Filament installed successfully.', 'success');
                    var area = document.getElementById('gen-filament-install-area');
                    if (area) {
                        area.innerHTML =
                            '<div class="gen-filament-install-success">' +
                                '<span class="sc-banner-icon">\u2705</span>' +
                                '<span class="sc-banner-text">Filament panel is installed and configured.</span>' +
                            '</div>';
                    }
                } else {
                    showToast(data.message || 'Filament installation failed.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Install Filament';
                }
            })
            .catch(function(e) {
                showToast('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Install Filament';
            });
        }

        function renderFilamentView() {
            var content = document.getElementById('gen-filament-content') || document.getElementById('gen-content');
            var schemas = (generateConfig && generateConfig.schemas) ? generateConfig.schemas : [];

            var schemaListHtml = '';
            schemas.forEach(function(s) {
                schemaListHtml +=
                    '<div class="gen-filament-schema-row" data-schema="' + escapeAttr(s.class) + '">' +
                        '<div class="gen-filament-schema-info">' +
                            '<span class="gen-filament-schema-name">' + escapeHtml(s.modelName) + '</span>' +
                            '<span class="gen-filament-schema-class">' + escapeHtml(s.class) + '</span>' +
                        '</div>' +
                        '<div class="gen-filament-schema-actions">' +
                            '<button class="sc-btn sc-btn-sm gen-filament-preview-btn" data-schema="' + escapeAttr(s.class) + '">Preview</button>' +
                            '<button class="sc-btn sc-btn-sm primary gen-filament-generate-btn" data-schema="' + escapeAttr(s.class) + '">Generate</button>' +
                        '</div>' +
                    '</div>';
            });

            if (!schemaListHtml) {
                schemaListHtml = '<div style="padding:24px;color:var(--text-muted);text-align:center;">No schemas found</div>';
            }

            content.innerHTML =
                '<div>' +
                    '<p style="color:var(--text-muted);font-size:13px;margin:0 0 16px 0;">Generate Filament v5 admin panel resources from your schemas.</p>' +
                    '<div class="sc-form-group" style="display:flex;gap:16px;margin-bottom:16px;">' +
                        '<label class="sc-checkbox-label"><input type="checkbox" id="gen-filament-policy-cb"> Include Policy</label>' +
                        '<label class="sc-checkbox-label"><input type="checkbox" id="gen-filament-force-cb"> Force overwrite</label>' +
                    '</div>' +
                    '<div style="display:flex;gap:10px;margin-bottom:20px;">' +
                        '<button class="sc-btn" id="gen-filament-preview-all-btn">Preview All</button>' +
                        '<button class="sc-btn primary" id="gen-filament-generate-all-btn">Generate All</button>' +
                    '</div>' +
                    '<div class="gen-filament-schema-list">' + schemaListHtml + '</div>' +
                '</div>';

            // Bind per-schema buttons
            document.querySelectorAll('.gen-filament-preview-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { doFilamentAction(btn.dataset.schema, true); });
            });
            document.querySelectorAll('.gen-filament-generate-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { doFilamentAction(btn.dataset.schema, false); });
            });

            // Bind all buttons
            document.getElementById('gen-filament-preview-all-btn').addEventListener('click', function() {
                doFilamentAllAction(true);
            });
            document.getElementById('gen-filament-generate-all-btn').addEventListener('click', function() {
                doFilamentAllAction(false);
            });
        }

        function doFilamentAction(schemaClass, previewOnly) {
            var payload = {
                schema: schemaClass,
                withPolicy: document.getElementById('gen-filament-policy-cb').checked,
                force: document.getElementById('gen-filament-force-cb').checked,
            };

            if (previewOnly) {
                fetch('/_schema-craft/api/filament/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload),
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (!data.success) { showToast(data.message || 'Preview failed.', 'error'); return; }
                    showFilePreviewModal(data.files, 'Generate Filament', function() {
                        doFilamentWrite(payload);
                    });
                })
                .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
            } else {
                doFilamentWrite(payload);
            }
        }

        function doFilamentWrite(payload) {
            fetch('/_schema-craft/api/filament/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(payload),
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    showToast(data.message, 'success');
                } else {
                    showToast(data.message || 'Filament generation failed.', 'error');
                }
            })
            .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
        }

        function doFilamentAllAction(previewOnly) {
            var schemas = (generateConfig && generateConfig.schemas) ? generateConfig.schemas : [];
            if (!schemas.length) { showToast('No schemas found.', 'error'); return; }

            var withPolicy = document.getElementById('gen-filament-policy-cb').checked;
            var force = document.getElementById('gen-filament-force-cb').checked;

            if (previewOnly) {
                // Preview all by collecting files from each schema
                var allFiles = [];
                var remaining = schemas.length;
                var hadError = false;

                schemas.forEach(function(s) {
                    fetch('/_schema-craft/api/filament/preview', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({ schema: s.class, withPolicy: withPolicy }),
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.files) {
                            allFiles = allFiles.concat(data.files);
                        }
                        remaining--;
                        if (remaining === 0 && !hadError) {
                            showFilePreviewModal(allFiles, 'Generate All Filament', function() {
                                doFilamentGenerateAll(schemas, withPolicy, force);
                            });
                        }
                    })
                    .catch(function(e) {
                        hadError = true;
                        showToast('Error previewing: ' + e.message, 'error');
                    });
                });
            } else {
                doFilamentGenerateAll(schemas, withPolicy, force);
            }
        }

        function doFilamentGenerateAll(schemas, withPolicy, force) {
            var remaining = schemas.length;
            var totalCreated = 0;

            schemas.forEach(function(s) {
                fetch('/_schema-craft/api/filament/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ schema: s.class, withPolicy: withPolicy, force: force }),
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success && data.files) {
                        totalCreated += data.files.filter(function(f) { return f.created; }).length;
                    }
                    remaining--;
                    if (remaining === 0) {
                        showToast(totalCreated + ' Filament file(s) created.', 'success');
                    }
                })
                .catch(function() { remaining--; });
            });
        }

        // ── Helpers ────────────────────────────────────────
        function shortName(fqcn) { return fqcn.split('\\').pop(); }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
