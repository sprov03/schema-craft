                <span class="qb-modal-title" id="qb-modal-title"></span>
                <button class="qb-modal-close" id="qb-modal-close">&times;</button>
            </div>
            <div class="qb-modal-body" id="qb-modal-body"></div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        let schemaData = null;
        let activeTab = 'health';
        let explorerState = { loaded: new Map(), selected: null };
        let dragState = null;

        // ── Query Builder State ───────────────────────────
        let queryBuilderState = {
            savedQueries: [],
            currentQuery: null,
            name: '',
            baseTable: null,
            baseModel: null,
            baseSchema: null,
            loaded: new Map(),
            joins: [],
            conditions: [],
            sorts: [],
            selects: [],
            output: { scopeOnModel: true, apiEndpoint: false, inlineController: false },
            dirty: false,
            sidebarSearchQuery: '',
            selectedApi: null,
        };
        let qbDragState = null;
        let qbInitialized = false;
        let qbApiConfig = null; // { apis: {...}, defaultApi: 'default' }
        let qbActivePanel = 'conditions';
        let qbSidebarResizeState = null;
        let qbPanelResizeState = null;
        let qbPanelHeight = 260;
        let qbPanelCollapsed = false;
        let qbZoom = 1;

        async function init() {
            try {
                const resp = await fetch('/_schema-craft/api/schema');
                schemaData = await resp.json();
                document.getElementById('loading').hidden = true;
                renderHealthTab();
                document.getElementById('health-tab').hidden = false;
                renderModelList();
                bindEvents();
                restoreFromQueryParams();
            } catch (e) {
                document.getElementById('loading').innerHTML =
                    '<span style="color:var(--error)">Failed to load schema data: ' + escapeHtml(e.message) + '</span>';
            }
        }

        function restoreFromQueryParams() {
            var initialTab = getQueryParam('tab');
            var initialApi = getQueryParam('api');
            var initialStack = getQueryParam('stack');

            if (initialTab && document.querySelector('.tab-btn[data-tab="' + initialTab + '"]')) {
                if (initialTab === 'generate' && initialApi) {
                    // Pre-set generate state before switchTab triggers initGenerateTab
                    generateInitialized = true;
                    genSelectedApi = initialApi;
                    genSelectedStack = initialStack;
                    genSelectedView = initialStack ? 'stack' : null;

                    // switchTab will skip initGenerateTab since generateInitialized is true
                    switchTab(initialTab);

                    // Load the API config and render the main layout
                    loadGenerateConfig(initialApi, function() {
                        renderGenerateMain();
                    });
                } else {
                    switchTab(initialTab);
                }
            } else {
                switchTab('health');
            }
        }

        function bindEvents() {
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
            });
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('model-search').addEventListener('input', function(e) { filterModelList(e.target.value); });
            document.getElementById('explorer-canvas').addEventListener('mousedown', onCanvasMouseDown);
            document.addEventListener('mousemove', onCanvasMouseMove);
            document.addEventListener('mouseup', onCanvasMouseUp);

            // Query Builder canvas drag
            document.getElementById('qb-canvas-area').addEventListener('mousedown', onQbCanvasMouseDown);
            document.addEventListener('mousemove', onQbCanvasMouseMove);
            document.addEventListener('mouseup', onQbCanvasMouseUp);

            // QB bottom panel tabs
            document.querySelectorAll('.qb-panel-tab').forEach(function(btn) {
                btn.addEventListener('click', function() { switchQbPanel(btn.dataset.qbpanel); });
            });

            // QB modal close
            document.getElementById('qb-modal-close').addEventListener('click', closeQbModal);
            document.getElementById('qb-modal').addEventListener('click', function(e) {
                if (e.target === this) closeQbModal();
            });
        }

        function updateQueryParams(params) {
            var url = new URL(window.location);
            Object.keys(params).forEach(function(key) {
                if (params[key] === null || params[key] === undefined) {
                    url.searchParams.delete(key);
                } else {
                    url.searchParams.set(key, params[key]);
                }
            });
            history.replaceState(null, '', url);
        }

        function getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
            document.getElementById('health-tab').hidden = tab !== 'health';
            document.getElementById('explorer-tab').hidden = tab !== 'explorer';
            document.getElementById('query-builder-tab').hidden = tab !== 'query-builder';
            document.getElementById('schemas-tab').hidden = tab !== 'schemas';
            document.getElementById('status-tab').hidden = tab !== 'status';
            document.getElementById('generate-tab').hidden = tab !== 'generate';

            updateQueryParams({ tab: tab });
            if (tab !== 'generate') {
                updateQueryParams({ api: null, stack: null });
            }

            if (tab === 'query-builder') initQueryBuilder();
            if (tab === 'schemas') initSchemasTab();
            if (tab === 'status') initStatusTab();
            if (tab === 'generate') initGenerateTab();
        }

        function toggleTheme() {
            var html = document.documentElement;
            var next = html.dataset.theme === 'dark' ? 'light' : 'dark';
            html.dataset.theme = next;
            document.getElementById('theme-toggle').textContent = next === 'dark' ? 'Light' : 'Dark';
        }

        // ── Health Tab ─────────────────────────────────────
        function renderHealthTab() {
            var container = document.getElementById('health-tab');
            var s = schemaData.summary;

            var issues = deduplicateIssues(schemaData.issues);
            var groups = { error: [], warning: [], info: [] };
            issues.forEach(function(i) { if (groups[i.severity]) groups[i.severity].push(i); });

            var allIssueSchemas = new Set();
            issues.forEach(function(i) { i.affectedSchemas.forEach(function(s) { allIssueSchemas.add(s); }); });
            var healthySchemas = Object.keys(schemaData.schemas).filter(function(s) { return !allIssueSchemas.has(s); });

            var html = '<div class="summary-bar">' +
                '<div class="stat-card"><div class="stat-value">' + s.modelCount + '</div><div class="stat-label">Models</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + s.relationshipCount + '</div><div class="stat-label">Relationships</div></div>' +
                '<div class="stat-card issues ' + (issues.length === 0 ? 'zero' : '') + '"><div class="stat-value">' + issues.length + '</div><div class="stat-label">Issues</div></div>' +
                '</div>';

            if (issues.length > 0) {
                html += '<div class="section-title">Issues</div>';
                ['error', 'warning', 'info'].forEach(function(sev) {
                    groups[sev].forEach(function(issue) { html += renderIssueCard(issue); });
                });
            }

            if (healthySchemas.length > 0) {
                html += '<details class="healthy-section"><summary>Healthy Models (' + healthySchemas.length + ')</summary>' +
                    '<div class="healthy-list">' + healthySchemas.map(function(s) { return '<span class="healthy-chip">' + shortName(s) + '</span>'; }).join('') + '</div></details>';
            }

            container.innerHTML = html;
            bindHealthEvents();
        }

        function deduplicateIssues(issues) {
            var seen = new Set();
            return issues.filter(function(i) {
                var key = i.check + '::' + i.affectedSchemas.slice().sort().join(',');
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        }

        function renderIssueCard(issue) {
            var schemas = issue.affectedSchemas.map(function(s) {
                return '<span class="schema-pill" data-schema="' + escapeAttr(s) + '">' + shortName(s) + '</span>';
            }).join('');

            var fixHtml = '';
            if (issue.suggestedFix) {
                fixHtml = '<div class="fix-block"><button class="copy-btn" data-copy="' + escapeAttr(issue.suggestedFix) + '">Copy</button>' +
                    '<code class="fix-code">' + escapeHtml(issue.suggestedFix) + '</code></div>';
            }

            var applyHtml = '';
            if (issue.applyData) {
                applyHtml = '<div class="apply-actions">';
                if (issue.applyData.ambiguousTypes) {
                    issue.applyData.ambiguousTypes.forEach(function(type) {
                        var data = JSON.stringify({
                            schemaClass: issue.applyData.schemaClass,
                            relationshipType: type,
                            relatedModel: issue.applyData.relatedModel,
                            morphName: issue.applyData.morphName || null
                        });
                        var label = type.charAt(0).toUpperCase() + type.slice(1);
                        applyHtml += '<button class="apply-btn" data-apply=\'' + escapeAttr(data) + '\'>Apply as ' + label + '</button>';
                    });
                } else {
                    var data = JSON.stringify({
                        schemaClass: issue.applyData.schemaClass,
                        relationshipType: issue.applyData.relationshipType,
                        relatedModel: issue.applyData.relatedModel,
                        morphName: issue.applyData.morphName || null
                    });
                    applyHtml += '<button class="apply-btn" data-apply=\'' + escapeAttr(data) + '\'>Apply Fix</button>';
                }
                applyHtml += '</div>';
            }

            return '<div class="issue-card"><div class="issue-header"><span class="severity-dot ' + issue.severity + '"></span>' +
                '<span class="issue-message">' + escapeHtml(issue.message) + '</span></div>' +
                '<div class="issue-schemas">' + schemas + '</div>' + fixHtml + applyHtml + '</div>';
        }

        function applyRelationship(btn) {
            var data = JSON.parse(btn.dataset.apply);
            var originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Applying...';

            fetch('/_schema-craft/api/apply-relationship', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(data)
            }).then(function(resp) { return resp.json(); }).then(function(result) {
                if (result.success) {
                    btn.classList.add('applied');
                    btn.textContent = 'Applied!';
                    setTimeout(function() {
                        fetch('/_schema-craft/api/schema').then(function(r) { return r.json(); }).then(function(d) {
                            schemaData = d;
                            renderHealthTab();
                            document.getElementById('health-tab').hidden = false;
                            renderModelList();
                        });
                    }, 1000);
                } else {
                    btn.classList.add('errored');
                    btn.textContent = result.message || 'Error';
                    btn.disabled = false;
                }
            }).catch(function() {
                btn.classList.add('errored');
                btn.textContent = 'Network error';
                btn.disabled = false;
            });
        }

        function bindHealthEvents() {
            document.querySelectorAll('.schema-pill').forEach(function(pill) {
                pill.addEventListener('click', function() {
                    switchTab('explorer');
                    loadSchemaIntoExplorer(pill.dataset.schema);
                });
            });
            document.querySelectorAll('.copy-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    navigator.clipboard.writeText(btn.dataset.copy).then(function() {
                        btn.classList.add('copied');
                        btn.textContent = 'Copied!';
                        setTimeout(function() { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500);
                    });
                });
            });
            document.querySelectorAll('.apply-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { applyRelationship(btn); });
            });
        }

        // ── Explorer: Model List ───────────────────────────
        function renderModelList() {
            var list = document.getElementById('model-list');
            var keys = Object.keys(schemaData.schemas).sort(function(a, b) { return shortName(a).localeCompare(shortName(b)); });

            list.innerHTML = keys.map(function(key) {
                var s = schemaData.schemas[key];
                return '<li class="model-list-item" data-schema="' + escapeAttr(key) + '">' +
                    '<div class="model-name">' + shortName(key) + '</div>' +
                    '<div class="model-table-name">' + escapeHtml(s.tableName) + '</div></li>';
            }).join('');

            list.querySelectorAll('.model-list-item').forEach(function(item) {
                item.addEventListener('click', function() { loadSchemaIntoExplorer(item.dataset.schema); });
            });
        }

        function filterModelList(query) {
            var q = query.toLowerCase();
            document.querySelectorAll('.model-list-item').forEach(function(item) {
                var name = item.querySelector('.model-name').textContent.toLowerCase();
                var table = item.querySelector('.model-table-name').textContent.toLowerCase();
                item.hidden = !(name.includes(q) || table.includes(q));
            });
        }

        function updateSidebarState() {
            document.querySelectorAll('.model-list-item').forEach(function(item) {
                item.classList.toggle('loaded', explorerState.loaded.has(item.dataset.schema));
                item.classList.toggle('active', item.dataset.schema === explorerState.selected);
            });
        }

        // ── Explorer: Canvas ───────────────────────────────
        function loadSchemaIntoExplorer(schemaClass) {
            if (!schemaData.schemas[schemaClass]) return;

            document.getElementById('explorer-empty').hidden = true;
            explorerState.selected = schemaClass;

            if (!explorerState.loaded.has(schemaClass)) {
                explorerState.loaded.set(schemaClass, calculatePosition(schemaClass));
            }

            renderExplorerCards();
            drawRelationshipLines();
            updateSidebarState();

            var card = document.querySelector('.schema-card[data-schema="' + CSS.escape(schemaClass) + '"]');
            if (card) {
                card.classList.add('highlighted');
                setTimeout(function() { card.classList.remove('highlighted'); }, 1000);
            }
        }

        function loadAllRelated(schemaClass) {
            var schema = schemaData.schemas[schemaClass];
            if (!schema) return;

            schema.relationships.forEach(function(rel) {
                if (rel.relatedSchema && !explorerState.loaded.has(rel.relatedSchema)) {
                    explorerState.loaded.set(rel.relatedSchema, calculatePosition(rel.relatedSchema, schemaClass));
                }
            });

            renderExplorerCards();
            drawRelationshipLines();
            updateSidebarState();
        }

        function removeSchemaFromExplorer(schemaClass) {
            explorerState.loaded.delete(schemaClass);
            if (explorerState.selected === schemaClass) {
                var iter = explorerState.loaded.keys();
                var next = iter.next();
                explorerState.selected = next.done ? null : next.value;
            }
            if (explorerState.loaded.size === 0) document.getElementById('explorer-empty').hidden = false;

            renderExplorerCards();
            drawRelationshipLines();
            updateSidebarState();
        }

        function calculatePosition(schemaClass, fromSchemaClass) {
            var canvas = document.getElementById('explorer-canvas');
            var rect = canvas.getBoundingClientRect();

            if (explorerState.loaded.size === 0) {
                return { x: Math.max(20, (rect.width / 2) - 140), y: 40 };
            }

            if (fromSchemaClass && explorerState.loaded.has(fromSchemaClass)) {
                var from = explorerState.loaded.get(fromSchemaClass);
                var fromSchema = schemaData.schemas[fromSchemaClass];
                var loadedCount = 0;
                if (fromSchema) {
                    fromSchema.relationships.forEach(function(r) {
                        if (r.relatedSchema && (explorerState.loaded.has(r.relatedSchema) || r.relatedSchema === schemaClass)) loadedCount++;
                    });
                }
                var angle = ((loadedCount - 1) / Math.max(loadedCount, 1)) * Math.PI * 1.5 - Math.PI * 0.75;
                var radius = 320;
                return {
                    x: Math.max(20, Math.min(rect.width - 300, from.x + Math.cos(angle) * radius)),
                    y: Math.max(20, Math.min(rect.height - 200, from.y + Math.sin(angle) * radius))
                };
            }

            var maxY = 0;
            explorerState.loaded.forEach(function(pos) { maxY = Math.max(maxY, pos.y); });
            return { x: 40, y: maxY + 250 };
        }

        function renderExplorerCards() {
            var container = document.getElementById('schema-cards');
            var html = '';

            explorerState.loaded.forEach(function(pos, schemaClass) {
                var schema = schemaData.schemas[schemaClass];
                if (!schema) return;

                var relsHtml = '';
                if (schema.relationships.length === 0) {
                    relsHtml = '<div class="no-rels">No relationships</div>';
                } else {
                    relsHtml = '<div class="card-relationships">';
                    schema.relationships.forEach(function(rel) {
                        var targetShort = rel.relatedSchema ? shortName(rel.relatedSchema) : rel.relatedModel.split('\\').pop();
                        var isLoaded = rel.relatedSchema && explorerState.loaded.has(rel.relatedSchema);
                        var btnClass = isLoaded ? 'load-btn loaded' : 'load-btn';
                        var btnText = isLoaded ? 'Loaded' : 'Load';
                        var btnAttr = (!isLoaded && rel.relatedSchema) ? ' data-load="' + escapeAttr(rel.relatedSchema) + '" data-from="' + escapeAttr(schemaClass) + '"' : '';

                        relsHtml += '<div class="rel-item">' +
                            '<span class="rel-type-badge ' + rel.type + '">' + rel.type + '</span>' +
                            '<span class="rel-name">' + escapeHtml(rel.name) + '</span>' +
                            '<span class="rel-target">' + escapeHtml(targetShort) + '</span>' +
                            (rel.relatedSchema ? '<button class="' + btnClass + '"' + btnAttr + '>' + btnText + '</button>' : '') +
                            '</div>';
                    });
                    relsHtml += '</div>';
                }

                var colsHtml = '';
                if (schema.columns.length > 0) {
                    colsHtml = '<details class="card-columns"><summary>Columns (' + schema.columns.length + ')</summary><ul class="column-list">';
                    schema.columns.forEach(function(col) {
                        var badges = '';
                        if (col.primary) badges += '<span class="col-badge pk">PK</span>';
                        if (col.nullable) badges += '<span class="col-badge nullable">null</span>';
                        if (col.unique) badges += '<span class="col-badge unique">uniq</span>';
                        if (col.index && !col.primary) badges += '<span class="col-badge indexed">idx</span>';
                        colsHtml += '<li class="column-item"><span class="col-name">' + escapeHtml(col.name) + '</span>' +
                            '<span class="col-type">' + escapeHtml(col.type) + '</span>' + badges + '</li>';
                    });
                    colsHtml += '</ul></details>';
                }

                var loadAllBtn = schema.relationships.length > 0 ?
                    '<button class="load-all-btn" data-loadall="' + escapeAttr(schemaClass) + '">Load All</button>' : '';

                html += '<div class="schema-card" data-schema="' + escapeAttr(schemaClass) + '" style="transform:translate(' + pos.x + 'px,' + pos.y + 'px)">' +
                    '<div class="card-header" data-drag="' + escapeAttr(schemaClass) + '">' +
                    '<span class="card-title">' + shortName(schemaClass) + '</span>' +
                    '<span class="table-badge">' + escapeHtml(schema.tableName) + '</span>' +
                    loadAllBtn +
                    '<button class="close-card-btn" data-close="' + escapeAttr(schemaClass) + '">&times;</button>' +
                    '</div>' + relsHtml + colsHtml + '</div>';
            });

            container.innerHTML = html;

            container.querySelectorAll('.load-btn[data-load]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    explorerState.loaded.set(btn.dataset.load, calculatePosition(btn.dataset.load, btn.dataset.from));
                    renderExplorerCards();
                    drawRelationshipLines();
                    updateSidebarState();
                });
            });
            container.querySelectorAll('.load-all-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) { e.stopPropagation(); loadAllRelated(btn.dataset.loadall); });
            });
            container.querySelectorAll('.close-card-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) { e.stopPropagation(); removeSchemaFromExplorer(btn.dataset.close); });
            });
        }

        // ── Explorer: SVG Lines ────────────────────────────
        function drawRelationshipLines() {
            var svg = document.getElementById('relationship-svg');
            svg.innerHTML = '';
            var canvas = document.getElementById('explorer-canvas');
            var drawn = new Set();

            explorerState.loaded.forEach(function(_, schemaClass) {
                var schema = schemaData.schemas[schemaClass];
                if (!schema) return;

                var sourceEl = canvas.querySelector('.schema-card[data-schema="' + CSS.escape(schemaClass) + '"]');
                if (!sourceEl) return;

                schema.relationships.forEach(function(rel) {
                    if (!rel.relatedSchema || !explorerState.loaded.has(rel.relatedSchema)) return;

                    var pairKey = [schemaClass, rel.relatedSchema].sort().join('::') + '::' + rel.name;
                    if (drawn.has(pairKey)) return;
                    drawn.add(pairKey);

                    var targetEl = canvas.querySelector('.schema-card[data-schema="' + CSS.escape(rel.relatedSchema) + '"]');
                    if (!targetEl) return;

                    var sPos = explorerState.loaded.get(schemaClass);
                    var tPos = explorerState.loaded.get(rel.relatedSchema);

                    var sx = sPos.x + sourceEl.offsetWidth / 2;
                    var sy = sPos.y + sourceEl.offsetHeight / 2;
                    var tx = tPos.x + targetEl.offsetWidth / 2;
                    var ty = tPos.y + targetEl.offsetHeight / 2;

                    var lineClass = 'solid';
                    if (rel.type === 'belongsToMany') lineClass = 'dashed';
                    if (rel.type.indexOf('morph') === 0) lineClass = 'dotted';

                    var dx = tx - sx;
                    var dy = ty - sy;
                    var cx = sx + dx * 0.5;
                    var cy = sy + dy * 0.5 - Math.min(Math.abs(dx) * 0.15, 40);

                    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', 'M ' + sx + ' ' + sy + ' Q ' + cx + ' ' + cy + ' ' + tx + ' ' + ty);
                    path.setAttribute('class', 'rel-line ' + lineClass);
                    svg.appendChild(path);

                    var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', sx + dx * 0.5);
                    label.setAttribute('y', cy - 6);
                    label.setAttribute('class', 'rel-line-label');
                    label.setAttribute('text-anchor', 'middle');
                    label.textContent = rel.name + ' (' + rel.type + ')';
                    svg.appendChild(label);
                });
            });
        }

        // ── Explorer: Drag ─────────────────────────────────
        function onCanvasMouseDown(e) {
            var header = e.target.closest('[data-drag]');
            if (!header) return;
            var sc = header.dataset.drag;
            var pos = explorerState.loaded.get(sc);
            if (!pos) return;
            dragState = { schemaClass: sc, startX: e.clientX, startY: e.clientY, origX: pos.x, origY: pos.y };
            e.preventDefault();
        }

        function onCanvasMouseMove(e) {
            if (!dragState) return;
            var newX = Math.max(0, dragState.origX + (e.clientX - dragState.startX));
            var newY = Math.max(0, dragState.origY + (e.clientY - dragState.startY));
            explorerState.loaded.set(dragState.schemaClass, { x: newX, y: newY });
            var card = document.querySelector('.schema-card[data-schema="' + CSS.escape(dragState.schemaClass) + '"]');
            if (card) card.style.transform = 'translate(' + newX + 'px,' + newY + 'px)';
            drawRelationshipLines();
        }

        function onCanvasMouseUp() { dragState = null; }

        // ── Query Builder ─────────────────────────────────────

        function initQueryBuilder() {
            if (!qbInitialized) {
                qbInitialized = true;
                fetchSavedQueries();

                // Bind panel resize and collapse
                var panelHandle = document.getElementById('qb-panel-resize-handle');
                if (panelHandle) panelHandle.addEventListener('mousedown', onPanelResizeStart);
                var collapseBtn = document.getElementById('qb-panel-collapse');
                if (collapseBtn) collapseBtn.addEventListener('click', togglePanelCollapse);

                // Bind canvas zoom buttons (scroll is native via overflow:auto)
                var zoomIn = document.getElementById('qb-zoom-in');
                if (zoomIn) zoomIn.addEventListener('click', function() { qbZoom = Math.min(2, qbZoom + 0.1); updateCanvasTransform(); });
                var zoomOut = document.getElementById('qb-zoom-out');
                if (zoomOut) zoomOut.addEventListener('click', function() { qbZoom = Math.max(0.25, qbZoom - 0.1); updateCanvasTransform(); });
                var zoomReset = document.getElementById('qb-zoom-reset');
                if (zoomReset) zoomReset.addEventListener('click', function() {
                    qbZoom = 1;
                    updateCanvasTransform();
                    var canvasArea = document.getElementById('qb-canvas-area');
                    if (canvasArea) { canvasArea.scrollTop = 0; canvasArea.scrollLeft = 0; }
                });
            }
            renderQueryBuilderSidebar();
            renderQueryCanvas();
            renderBottomPanel();
        }

        // ── QB: Saved Queries ─────────────────────────────
        async function fetchSavedQueries() {
            try {
                var resp = await fetch('/_schema-craft/api/queries');
                if (resp.ok) {
                    var data = await resp.json();
                    queryBuilderState.savedQueries = Array.isArray(data) ? data : (data.queries || []);
                } else {
                    queryBuilderState.savedQueries = [];
                }
            } catch (e) {
                queryBuilderState.savedQueries = [];
            }
            renderQueryBuilderSidebar();
        }

        async function loadSavedQuery(name) {
            try {
                var resp = await fetch('/_schema-craft/api/queries/' + encodeURIComponent(name));
                if (!resp.ok) return;
                var data = await resp.json();
                var q = data.query || data;

                // Reset state
                resetQueryBuilderState();
                queryBuilderState.currentQuery = name;
                queryBuilderState.name = name;

                // Load base table
                if (q.baseModel || q.base_model) {
                    var baseModel = q.baseModel || q.base_model;
                    var baseSchemaClass = findSchemaClassByModel(baseModel);
                    if (baseSchemaClass) {
                        selectBaseTable(baseSchemaClass, true);
                    }
                }

                // Load joins
                if (q.joins && Array.isArray(q.joins)) {
                    q.joins.forEach(function(j) {
                        var joinSchema = findSchemaClassByTable(j.table) || findSchemaClassByModel(j.model);
                        queryBuilderState.joins.push({
                            type: j.type || 'inner',
                            table: j.table,
                            schema: joinSchema,
                            model: j.model,
                            localColumn: j.localColumn || j.local_column,
                            foreignColumn: j.foreignColumn || j.foreign_column,
                            alias: j.alias || null,
                            relationshipName: j.relationshipName || j.relationship_name || null,
                        });
                        if (joinSchema && !queryBuilderState.loaded.has(joinSchema)) {
                            queryBuilderState.loaded.set(joinSchema, qbCalculatePosition(joinSchema, queryBuilderState.baseSchema));
                        }
                    });
                }

                // Load conditions tree
                if (q.conditions && Array.isArray(q.conditions)) {
                    // New tree format: conditions have 'type' key
                    if (q.conditions.length > 0 && q.conditions[0].type) {
                        queryBuilderState.conditions = q.conditions;
                    } else {
                        // Legacy flat format: unflatten from groupId refs
                        queryBuilderState.conditions = unflattenConditions(q.conditions, q.conditionGroups || [], q.whereHas || []);
                    }
                }

                // Load sorts
                if (q.sorts && Array.isArray(q.sorts)) {
                    queryBuilderState.sorts = q.sorts.map(function(s) {
                        return { column: s.column, direction: s.direction || 'asc' };
                    });
                }

                // Load output
                if (q.output) {
                    queryBuilderState.output = {
                        scopeOnModel: q.output.scopeOnModel !== undefined ? q.output.scopeOnModel : (q.output.scope_on_model !== undefined ? q.output.scope_on_model : true),
                        apiEndpoint: q.output.apiEndpoint !== undefined ? q.output.apiEndpoint : (q.output.api_endpoint !== undefined ? q.output.api_endpoint : false),
                        inlineController: q.output.inlineController !== undefined ? q.output.inlineController : (q.output.inline_controller !== undefined ? q.output.inline_controller : false),
                    };
                }

                queryBuilderState.dirty = false;
                renderQueryBuilderSidebar();
                renderQueryCanvas();
                renderBottomPanel();
            } catch (e) {
                // Silently fail
            }
        }

        async function deleteSavedQuery(name) {
            if (!confirm('Delete saved query "' + name + '"?')) return;
            try {
                await fetch('/_schema-craft/api/queries/' + encodeURIComponent(name), { method: 'DELETE' });
                if (queryBuilderState.currentQuery === name) {
                    resetQueryBuilderState();
                }
                await fetchSavedQueries();
                renderQueryCanvas();
                renderBottomPanel();
            } catch (e) {
                // Silently fail
            }
        }

        function resetQueryBuilderState() {
            queryBuilderState.currentQuery = null;
            queryBuilderState.name = '';
            queryBuilderState.baseTable = null;
            queryBuilderState.baseModel = null;
            queryBuilderState.baseSchema = null;
            queryBuilderState.loaded = new Map();
            queryBuilderState.joins = [];
            queryBuilderState.conditions = [];
            queryBuilderState.sorts = [];
            queryBuilderState.selects = [];
            queryBuilderState.output = { scopeOnModel: true, apiEndpoint: false, inlineController: false };
            queryBuilderState.dirty = false;
            qbZoom = 1;
            updateCanvasTransform();
            var canvasArea = document.getElementById('qb-canvas-area');
            if (canvasArea) { canvasArea.scrollTop = 0; canvasArea.scrollLeft = 0; }
        }

        // ── QB: Sidebar Resize ──────────────────────────────
        function onSidebarResizeStart(e) {
            e.preventDefault();
            var sidebar = document.getElementById('qb-sidebar');
            qbSidebarResizeState = { startX: e.clientX, startWidth: sidebar.offsetWidth };
            e.target.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            document.addEventListener('mousemove', onSidebarResizeMove);
            document.addEventListener('mouseup', onSidebarResizeEnd);
        }
        function onSidebarResizeMove(e) {
            if (!qbSidebarResizeState) return;
            var newWidth = Math.max(160, Math.min(400, qbSidebarResizeState.startWidth + (e.clientX - qbSidebarResizeState.startX)));
            document.getElementById('qb-sidebar').style.width = newWidth + 'px';
        }
        function onSidebarResizeEnd() {
            if (!qbSidebarResizeState) return;
            var handle = document.querySelector('.qb-sidebar-resize-handle');
            if (handle) handle.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            qbSidebarResizeState = null;
            document.removeEventListener('mousemove', onSidebarResizeMove);
            document.removeEventListener('mouseup', onSidebarResizeEnd);
        }

        // ── QB: Bottom Panel Resize & Collapse ─────────────
        function onPanelResizeStart(e) {
            e.preventDefault();
            var panel = document.getElementById('qb-bottom-panel');
            qbPanelResizeState = { startY: e.clientY, startHeight: panel.offsetHeight };
            e.target.classList.add('dragging');
            document.body.style.cursor = 'row-resize';
            document.body.style.userSelect = 'none';
            document.addEventListener('mousemove', onPanelResizeMove);
            document.addEventListener('mouseup', onPanelResizeEnd);
        }
        function onPanelResizeMove(e) {
            if (!qbPanelResizeState) return;
            var maxH = window.innerHeight * 0.5;
            var newHeight = Math.max(80, Math.min(maxH, qbPanelResizeState.startHeight - (e.clientY - qbPanelResizeState.startY)));
            var panel = document.getElementById('qb-bottom-panel');
            panel.style.height = newHeight + 'px';
            qbPanelHeight = newHeight;
        }
        function onPanelResizeEnd() {
            if (!qbPanelResizeState) return;
            var handle = document.querySelector('.qb-panel-resize-handle');
            if (handle) handle.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            qbPanelResizeState = null;
            document.removeEventListener('mousemove', onPanelResizeMove);
            document.removeEventListener('mouseup', onPanelResizeEnd);
        }
        function togglePanelCollapse() {
            qbPanelCollapsed = !qbPanelCollapsed;
            var panel = document.getElementById('qb-bottom-panel');
            var collapseBtn = document.getElementById('qb-panel-collapse');
            var content = panel.querySelector('.qb-panel-content');
            var resizeHandle = panel.querySelector('.qb-panel-resize-handle');
            if (qbPanelCollapsed) {
                panel.style.height = '36px';
                if (content) content.style.display = 'none';
                if (resizeHandle) resizeHandle.style.display = 'none';
                if (collapseBtn) { collapseBtn.classList.add('collapsed'); collapseBtn.title = 'Expand panel'; }
            } else {
                panel.style.height = qbPanelHeight + 'px';
                if (content) content.style.display = '';
                if (resizeHandle) resizeHandle.style.display = '';
                if (collapseBtn) { collapseBtn.classList.remove('collapsed'); collapseBtn.title = 'Collapse panel'; }
            }
        }

        // ── QB: Canvas Zoom ──────────────────────────────────
        function updateCanvasTransform() {
            var viewport = document.getElementById('qb-canvas-viewport');
            if (viewport) {
                viewport.style.transform = 'scale(' + qbZoom + ')';
            }
            updateCanvasSizer();
            var levelEl = document.getElementById('qb-zoom-level');
            if (levelEl) {
                levelEl.textContent = Math.round(qbZoom * 100) + '%';
            }
        }
        function updateCanvasSizer() {
            var sizer = document.getElementById('qb-canvas-sizer');
            if (!sizer) return;
            var maxX = 800, maxY = 600;
            queryBuilderState.loaded.forEach(function(pos) {
                maxX = Math.max(maxX, pos.x + 400);
                maxY = Math.max(maxY, pos.y + 400);
            });
            sizer.style.width = Math.ceil(maxX * qbZoom) + 'px';
            sizer.style.height = Math.ceil(maxY * qbZoom) + 'px';
        }

        // ── QB: Sidebar Rendering ─────────────────────────
        function renderQueryBuilderSidebar() {
            var sidebar = document.getElementById('qb-sidebar');
            var html = '';

            // Saved Queries section
            html += '<div class="qb-sidebar-section">';
            html += '<div class="qb-sidebar-header"><span>Saved Queries</span><button class="qb-new-btn" id="qb-new-query-btn">+ New</button></div>';
            if (queryBuilderState.savedQueries.length === 0) {
                html += '<div class="qb-saved-empty">No saved queries yet</div>';
            } else {
                html += '<ul class="qb-saved-list">';
                queryBuilderState.savedQueries.forEach(function(q) {
                    var name = typeof q === 'string' ? q : (q.name || q);
                    var isActive = queryBuilderState.currentQuery === name;
                    html += '<li class="qb-saved-item' + (isActive ? ' active' : '') + '" data-qbquery="' + escapeAttr(name) + '">' +
                        '<span class="qb-saved-item-name">' + escapeHtml(name) + '</span>' +
                        '<button class="qb-saved-delete" data-qbdelete="' + escapeAttr(name) + '">&times;</button>' +
                        '</li>';
                });
                html += '</ul>';
            }
            html += '</div>';

            // Schemas section
            html += '<div class="qb-sidebar-section qb-schemas-section">';
            html += '<div class="qb-sidebar-header"><span>Schemas</span></div>';
            html += '<div class="qb-schema-search"><input type="search" id="qb-schema-search" placeholder="Search schemas..." value="' + escapeAttr(queryBuilderState.sidebarSearchQuery) + '"></div>';
            html += '<ul class="qb-schema-list" id="qb-schema-list">';

            if (schemaData) {
                var keys = Object.keys(schemaData.schemas).sort(function(a, b) { return shortName(a).localeCompare(shortName(b)); });
                keys.forEach(function(key) {
                    var s = schemaData.schemas[key];
                    var isBase = queryBuilderState.baseSchema === key;
                    var isJoined = !isBase && queryBuilderState.loaded.has(key);
                    var cls = 'qb-schema-item';
                    if (isBase) cls += ' qb-base';
                    if (isJoined) cls += ' qb-joined';
                    var star = isBase ? '\u2605' : '\u25B8';

                    html += '<li class="' + cls + '" data-qbschema="' + escapeAttr(key) + '">' +
                        '<span class="qb-schema-star">' + star + '</span>' +
                        '<span class="qb-schema-item-name">' + shortName(key) + '</span>' +
                        '<span class="qb-schema-item-table">' + escapeHtml(s.tableName) + '</span>' +
                        '</li>';
                });
            }
            html += '</ul></div>';

            sidebar.innerHTML = html;

            // Add resize handle
            var existingHandle = sidebar.querySelector('.qb-sidebar-resize-handle');
            if (!existingHandle) {
                var handle = document.createElement('div');
                handle.className = 'qb-sidebar-resize-handle';
                sidebar.appendChild(handle);
                handle.addEventListener('mousedown', onSidebarResizeStart);
            }

            bindQbSidebarEvents();
        }

        function bindQbSidebarEvents() {
            var newBtn = document.getElementById('qb-new-query-btn');
            if (newBtn) {
                newBtn.addEventListener('click', function() {
                    resetQueryBuilderState();
                    renderQueryBuilderSidebar();
                    renderQueryCanvas();
                    renderBottomPanel();
                });
            }

            document.querySelectorAll('.qb-saved-item').forEach(function(item) {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('.qb-saved-delete')) return;
                    loadSavedQuery(item.dataset.qbquery);
                });
            });

            document.querySelectorAll('.qb-saved-delete').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteSavedQuery(btn.dataset.qbdelete);
                });
            });

            document.querySelectorAll('.qb-schema-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    selectBaseTable(item.dataset.qbschema);
                });
            });

            var searchInput = document.getElementById('qb-schema-search');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    queryBuilderState.sidebarSearchQuery = e.target.value;
                    filterQbSchemaList(e.target.value);
                });
            }

            // Re-apply active search filter after re-render
            if (queryBuilderState.sidebarSearchQuery) {
                filterQbSchemaList(queryBuilderState.sidebarSearchQuery);
            }
        }

        function filterQbSchemaList(query) {
            var q = query.toLowerCase();
            document.querySelectorAll('.qb-schema-item').forEach(function(item) {
                var name = item.querySelector('.qb-schema-item-name').textContent.toLowerCase();
                var table = item.querySelector('.qb-schema-item-table').textContent.toLowerCase();
                item.hidden = !(name.includes(q) || table.includes(q));
            });
        }

        // ── QB: Base Table Selection ──────────────────────
        function selectBaseTable(schemaClass, skipRender) {
            var schema = schemaData.schemas[schemaClass];
            if (!schema) return;

            // If this is already the base, do nothing
            if (queryBuilderState.baseSchema === schemaClass) return;

            // If no base set yet, set it
            if (!queryBuilderState.baseSchema) {
                queryBuilderState.baseSchema = schemaClass;
                queryBuilderState.baseTable = schema.tableName;
                queryBuilderState.baseModel = schema.modelClass || schemaClass.replace('\\Schemas\\', '\\Models\\').replace(/Schema$/, '');

                var canvas = document.getElementById('qb-canvas-area');
                var rect = canvas.getBoundingClientRect();
                queryBuilderState.loaded.set(schemaClass, { x: Math.max(20, (rect.width / 2) - 140), y: 40 });
                queryBuilderState.dirty = true;

                var emptyEl = document.getElementById('qb-canvas-empty');
                if (emptyEl) emptyEl.hidden = true;
            } else {
                // Changing the base table: reset joins and reload
                var oldJoins = queryBuilderState.joins;
                queryBuilderState.joins = [];
                queryBuilderState.loaded = new Map();
                queryBuilderState.baseSchema = schemaClass;
                queryBuilderState.baseTable = schema.tableName;
                queryBuilderState.baseModel = schema.modelClass || schemaClass.replace('\\Schemas\\', '\\Models\\').replace(/Schema$/, '');

                var canvas = document.getElementById('qb-canvas-area');
                var rect = canvas.getBoundingClientRect();
                queryBuilderState.loaded.set(schemaClass, { x: Math.max(20, (rect.width / 2) - 140), y: 40 });
                queryBuilderState.dirty = true;

                var emptyEl2 = document.getElementById('qb-canvas-empty');
                if (emptyEl2) emptyEl2.hidden = true;
            }

            if (!skipRender) {
                renderQueryBuilderSidebar();
                renderQueryCanvas();
                renderBottomPanel();
            }
        }

        // ── QB: Add Join from Relationship ────────────────
        function showJoinTypePopover(schemaClass, relName, anchorEl) {
            dismissJoinPopover();
            var rect = anchorEl.getBoundingClientRect();

            // Determine current state for this relationship
            var rel = (schemaData.schemas[schemaClass] || {}).relationships || [];
            var relDef = rel.find(function(r) { return r.name === relName; });
            var relatedSchema = relDef ? relDef.relatedSchema : null;

            var existingJoin = queryBuilderState.joins.find(function(j) {
                return j.schema === relatedSchema && j.relationshipName === relName;
            });
            var existingWhereHas = queryBuilderState.conditions.some(function(n) {
                return n.type === 'whereHas' && n.relationship === relName && n.sourceSchema === schemaClass;
            });
            var activeJoinType = existingJoin ? existingJoin.type : null;

            var popover = document.createElement('div');
            popover.className = 'qb-join-popover';
            popover.id = 'qb-join-popover';
            popover.innerHTML =
                '<div class="qb-join-popover-header">' +
                    '<span>Choose action</span>' +
                    '<button class="qb-join-info-btn" title="Learn more about join types">ℹ</button>' +
                '</div>' +
                '<button class="qb-join-popover-option' + (activeJoinType === 'inner' ? ' active' : '') + '" data-jointype="inner">' +
                    '<span class="qb-join-popover-icon" style="color:var(--accent)">●━━●</span>' +
                    '<div><div class="qb-join-popover-label">INNER JOIN</div>' +
                    '<div class="qb-join-popover-desc">Both sides must have a matching row</div></div></button>' +
                '<button class="qb-join-popover-option' + (activeJoinType === 'left' ? ' active' : '') + '" data-jointype="left">' +
                    '<span class="qb-join-popover-icon" style="color:var(--info)">●━━○</span>' +
                    '<div><div class="qb-join-popover-label">LEFT JOIN</div>' +
                    '<div class="qb-join-popover-desc">All base rows kept, joined side may be NULL</div></div></button>' +
                '<button class="qb-join-popover-option' + (activeJoinType === 'right' ? ' active' : '') + '" data-jointype="right">' +
                    '<span class="qb-join-popover-icon" style="color:var(--warning)">○━━●</span>' +
                    '<div><div class="qb-join-popover-label">RIGHT JOIN</div>' +
                    '<div class="qb-join-popover-desc">All joined rows kept, base side may be NULL</div></div></button>' +
                '<button class="qb-join-popover-option' + (existingWhereHas ? ' active' : '') + '" data-jointype="whereHas">' +
                    '<span class="qb-join-popover-icon" style="color:var(--success)">⊃⊂</span>' +
                    '<div><div class="qb-join-popover-label">WHERE HAS</div>' +
                    '<div class="qb-join-popover-desc">Subquery filter — no duplicates, supports count</div></div></button>';
            document.body.appendChild(popover);
            // Position below the anchor
            var popRect = popover.getBoundingClientRect();
            popover.style.position = 'fixed';
            popover.style.top = (rect.bottom + 4) + 'px';
            popover.style.left = Math.max(4, Math.min(window.innerWidth - popRect.width - 4, rect.left)) + 'px';

            // Bind info button
            popover.querySelector('.qb-join-info-btn').addEventListener('click', function(e) {
                e.stopPropagation();
                dismissJoinPopover();
                showJoinInfoModal();
            });

            popover.querySelectorAll('.qb-join-popover-option').forEach(function(opt) {
                opt.addEventListener('click', function() {
                    if (opt.dataset.jointype === 'whereHas') {
                        // Always adds a new whereHas (supports multiples)
                        addWhereHasFromRelationship(schemaClass, relName);
                    } else if (existingJoin && opt.dataset.jointype === activeJoinType) {
                        // Clicking the already-active join type — do nothing (already applied)
                    } else if (existingJoin) {
                        // Change the join type
                        existingJoin.type = opt.dataset.jointype;
                        renderQueryCanvas();
                        renderBottomPanel();
                    } else {
                        addJoinFromRelationship(schemaClass, relName, opt.dataset.jointype);
                    }
                    dismissJoinPopover();
                });
            });
            // Dismiss on outside click (next tick)
            setTimeout(function() {
                document.addEventListener('click', onJoinPopoverOutsideClick);
            }, 0);
        }
        function onJoinPopoverOutsideClick(e) {
            var pop = document.getElementById('qb-join-popover');
            if (pop && !pop.contains(e.target)) {
                dismissJoinPopover();
            }
        }
        function dismissJoinPopover() {
            var pop = document.getElementById('qb-join-popover');
            if (pop) pop.remove();
            document.removeEventListener('click', onJoinPopoverOutsideClick);
        }

        function addJoinFromRelationship(schemaClass, relName, joinType) {
            var schema = schemaData.schemas[schemaClass];
            if (!schema) return;

            var rel = schema.relationships.find(function(r) { return r.name === relName; });
            if (!rel || !rel.relatedSchema) return;

            // Check if already joined
            var alreadyJoined = queryBuilderState.joins.some(function(j) {
                return j.schema === rel.relatedSchema && j.relationshipName === relName;
            });
            if (alreadyJoined) return;

            var relatedSchema = schemaData.schemas[rel.relatedSchema];
            if (!relatedSchema) return;

            // Determine join columns based on relationship type
            var localCol = '', foreignCol = '';
            if (rel.type === 'belongsTo') {
                localCol = rel.foreignKey || (relatedSchema.tableName.replace(/s$/, '') + '_id');
                foreignCol = rel.ownerKey || 'id';
            } else if (rel.type === 'hasMany' || rel.type === 'hasOne') {
                localCol = 'id';
                foreignCol = rel.foreignKey || (schema.tableName.replace(/s$/, '') + '_id');
            } else {
                localCol = 'id';
                foreignCol = 'id';
            }

            queryBuilderState.joins.push({
                type: joinType || 'inner',
                table: relatedSchema.tableName,
                schema: rel.relatedSchema,
                model: rel.relatedModel,
                localColumn: queryBuilderState.baseTable + '.' + localCol,
                foreignColumn: relatedSchema.tableName + '.' + foreignCol,
                alias: null,
                relationshipName: relName,
            });

            if (!queryBuilderState.loaded.has(rel.relatedSchema)) {
                queryBuilderState.loaded.set(rel.relatedSchema, qbCalculatePosition(rel.relatedSchema, schemaClass));
            }

            queryBuilderState.dirty = true;
            renderQueryBuilderSidebar();
            renderQueryCanvas();
            renderBottomPanel();
        }

        function addWhereHasFromRelationship(schemaClass, relName) {
            var schema = schemaData.schemas[schemaClass];
            if (!schema) return;

            var rel = schema.relationships.find(function(r) { return r.name === relName; });
            if (!rel || !rel.relatedSchema) return;

            var relatedSchema = schemaData.schemas[rel.relatedSchema];
            if (!relatedSchema) return;

            // Load the related schema so its columns are available
            if (!queryBuilderState.loaded.has(rel.relatedSchema)) {
                queryBuilderState.loaded.set(rel.relatedSchema, qbCalculatePosition(rel.relatedSchema, schemaClass));
            }

            // Find the model for the source schema
            var sourceModel = schema.modelClass || schemaClass;

            // Add a whereHas node to the conditions tree
            queryBuilderState.conditions.push({
                type: 'whereHas',
                relationship: relName,
                sourceSchema: schemaClass,
                relatedSchema: rel.relatedSchema,
                sourceModel: sourceModel,
                boolean: 'and',
                hasType: 'has',
                countOperator: null,
                countValue: null,
                children: [],
            });

            queryBuilderState.dirty = true;

            // Switch to conditions tab and expand panel
            switchQbPanel('conditions');
            if (qbPanelCollapsed) togglePanelCollapse();
            renderConditionsPanel();
            renderQueryCanvas();

            // Scroll to the newly added whereHas block
            setTimeout(function() {
                var panelContent = document.querySelector('.qb-panel-content');
                if (panelContent) panelContent.scrollTop = panelContent.scrollHeight;
            }, 50);
        }

        function removeJoin(index) {
            var join = queryBuilderState.joins[index];
            if (join && join.schema) {
                // Check if any other join references this schema
                var otherRefs = queryBuilderState.joins.some(function(j, i) {
                    return i !== index && j.schema === join.schema;
                });
                if (!otherRefs && join.schema !== queryBuilderState.baseSchema) {
                    queryBuilderState.loaded.delete(join.schema);
                }
            }
            queryBuilderState.joins.splice(index, 1);
            queryBuilderState.dirty = true;
            renderQueryBuilderSidebar();
            renderQueryCanvas();
            renderBottomPanel();
        }

        function cycleJoinType(index) {
            var types = ['inner', 'left', 'right'];
            var current = queryBuilderState.joins[index].type;
            var nextIdx = (types.indexOf(current) + 1) % types.length;
            queryBuilderState.joins[index].type = types[nextIdx];
            queryBuilderState.dirty = true;
            renderQueryCanvas();
            renderBottomPanel();
        }

        function qbCalculatePosition(schemaClass, fromSchemaClass) {
            var canvas = document.getElementById('qb-canvas-area');
            var rect = canvas.getBoundingClientRect();

            if (fromSchemaClass && queryBuilderState.loaded.has(fromSchemaClass)) {
                var from = queryBuilderState.loaded.get(fromSchemaClass);
                var joinIndex = queryBuilderState.joins.filter(function(j) { return j.schema; }).length;
                var angle = ((joinIndex) / Math.max(joinIndex + 1, 1)) * Math.PI * 1.2 - Math.PI * 0.3;
                var radius = 340;
                return {
                    x: Math.max(20, Math.min(rect.width - 300, from.x + Math.cos(angle) * radius)),
                    y: Math.max(20, Math.min(rect.height - 200, from.y + Math.sin(angle) * radius))
                };
            }

            var maxY = 0;
            queryBuilderState.loaded.forEach(function(pos) { maxY = Math.max(maxY, pos.y); });
            return { x: 40, y: maxY + 250 };
        }

        // ── QB: Canvas Rendering ──────────────────────────
        function renderQueryCanvas() {
            var container = document.getElementById('qb-cards');
            var emptyEl = document.getElementById('qb-canvas-empty');
            var html = '';

            if (queryBuilderState.loaded.size === 0) {
                container.innerHTML = '';
                if (emptyEl) emptyEl.hidden = false;
                document.getElementById('qb-join-svg').innerHTML = '';
                return;
            }
            if (emptyEl) emptyEl.hidden = true;

            queryBuilderState.loaded.forEach(function(pos, schemaClass) {
                var schema = schemaData.schemas[schemaClass];
                if (!schema) return;

                var isBase = schemaClass === queryBuilderState.baseSchema;
                var cardClass = 'qb-card' + (isBase ? ' qb-base-card' : '');

                // Badge
                var badgeHtml = '';
                if (isBase) {
                    badgeHtml = '<span class="qb-base-badge">BASE</span>';
                } else {
                    var joinInfo = queryBuilderState.joins.find(function(j) { return j.schema === schemaClass; });
                    if (joinInfo) {
                        var joinIdx = queryBuilderState.joins.indexOf(joinInfo);
                        badgeHtml = '<button class="qb-join-badge ' + joinInfo.type + '" data-qbcyclejoin="' + joinIdx + '">' + joinInfo.type.toUpperCase() + ' JOIN</button>';
                    }
                }

                // Relationships (show joinable ones)
                var relsHtml = '';
                var joinableRels = schema.relationships.filter(function(rel) {
                    return rel.relatedSchema && (rel.type === 'belongsTo' || rel.type === 'hasMany' || rel.type === 'hasOne');
                });
                if (joinableRels.length > 0) {
                    relsHtml = '<div class="card-relationships">';
                    joinableRels.forEach(function(rel) {
                        var targetShort = shortName(rel.relatedSchema);
                        var existingJoin = queryBuilderState.joins.find(function(j) {
                            return j.schema === rel.relatedSchema && j.relationshipName === rel.name;
                        });
                        var hasWhereHas = queryBuilderState.conditions.some(function(n) {
                            return n.type === 'whereHas' && n.relationship === rel.name && n.sourceSchema === schemaClass;
                        });
                        var isJoined = !!existingJoin;

                        // Build button class and text based on state
                        var btnClass = 'qb-add-join-btn';
                        var btnText = 'Join';
                        if (isJoined && hasWhereHas) {
                            btnClass += ' joined where-has';
                            btnText = existingJoin.type.toUpperCase() + ' \u2713 \u2283\u2282';
                        } else if (isJoined) {
                            btnClass += ' joined';
                            btnText = existingJoin.type.toUpperCase() + ' \u2713';
                        } else if (hasWhereHas) {
                            btnClass += ' where-has';
                            btnText = '\u2283\u2282 Has';
                        }

                        relsHtml += '<div class="qb-rel-item">' +
                            '<span class="rel-type-badge ' + rel.type + '">' + rel.type + '</span>' +
                            '<span class="rel-name">' + escapeHtml(rel.name) + '</span>' +
                            '<span class="rel-target">' + escapeHtml(targetShort) + '</span>' +
                            '<button class="' + btnClass + '" data-qbjoin-schema="' + escapeAttr(schemaClass) + '" data-qbjoin-rel="' + escapeAttr(rel.name) + '">' + btnText + '</button>' +
                            '</div>';
                    });
                    relsHtml += '</div>';
                } else {
                    relsHtml = '<div class="no-rels">No joinable relationships</div>';
                }

                // Columns
                var colsHtml = '';
                if (schema.columns.length > 0) {
                    colsHtml = '<details class="card-columns"><summary>Columns (' + schema.columns.length + ')</summary><ul class="column-list">';
                    schema.columns.forEach(function(col) {
                        var badges = '';
                        if (col.primary) badges += '<span class="col-badge pk">PK</span>';
                        if (col.nullable) badges += '<span class="col-badge nullable">null</span>';
                        if (col.unique) badges += '<span class="col-badge unique">uniq</span>';
                        if (col.index && !col.primary) badges += '<span class="col-badge indexed">idx</span>';
                        var fullCol = schema.tableName + '.' + col.name;
                        colsHtml += '<li class="column-item" data-qbaddcond="' + escapeAttr(fullCol) + '" data-coltype="' + escapeAttr(col.type) + '">' +
                            '<span class="col-name">' + escapeHtml(col.name) + '</span>' +
                            '<span class="col-type">' + escapeHtml(col.type) + '</span>' + badges + '</li>';
                    });
                    colsHtml += '</ul></details>';
                }

                // Close button (only for joined cards, not the base)
                var closeBtn = '';
                if (!isBase) {
                    var joinIdx = queryBuilderState.joins.findIndex(function(j) { return j.schema === schemaClass; });
                    if (joinIdx >= 0) {
                        closeBtn = '<button class="close-card-btn" data-qbremovejoin="' + joinIdx + '">&times;</button>';
                    }
                }

                html += '<div class="' + cardClass + '" data-qbschema="' + escapeAttr(schemaClass) + '" style="transform:translate(' + pos.x + 'px,' + pos.y + 'px)">' +
                    '<div class="card-header" data-qbdrag="' + escapeAttr(schemaClass) + '">' +
                    '<span class="card-title">' + shortName(schemaClass) + '</span>' +
                    '<span class="table-badge">' + escapeHtml(schema.tableName) + '</span>' +
                    badgeHtml + closeBtn +
                    '</div>' + relsHtml + colsHtml + '</div>';
            });

            container.innerHTML = html;

            // Bind join buttons — show type picker popover
            container.querySelectorAll('.qb-add-join-btn[data-qbjoin-schema]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showJoinTypePopover(btn.dataset.qbjoinSchema, btn.dataset.qbjoinRel, btn);
                });
            });

            // Bind join badge cycling
            container.querySelectorAll('.qb-join-badge[data-qbcyclejoin]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    cycleJoinType(parseInt(btn.dataset.qbcyclejoin, 10));
                });
            });

            // Bind remove join buttons
            container.querySelectorAll('.close-card-btn[data-qbremovejoin]').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    removeJoin(parseInt(btn.dataset.qbremovejoin, 10));
                });
            });

            // Bind column click → add condition
            container.querySelectorAll('.column-item[data-qbaddcond]').forEach(function(li) {
                li.addEventListener('click', function(e) {
                    e.stopPropagation();
                    addConditionFromColumn(li.dataset.qbaddcond, li.dataset.coltype);
                });
            });

            drawJoinLines();
            updateCanvasSizer();
        }

        // ── QB: SVG Join Lines ────────────────────────────
        function drawJoinLines() {
            var svg = document.getElementById('qb-join-svg');
            svg.innerHTML = '';
            var canvasArea = document.getElementById('qb-canvas-area');

            queryBuilderState.joins.forEach(function(join, index) {
                if (!join.schema || !queryBuilderState.baseSchema) return;

                // Find source and target schemas for this join
                var sourceSchema = queryBuilderState.baseSchema;
                var targetSchema = join.schema;

                var sourcePos = queryBuilderState.loaded.get(sourceSchema);
                var targetPos = queryBuilderState.loaded.get(targetSchema);
                if (!sourcePos || !targetPos) return;

                var sourceEl = canvasArea.querySelector('.qb-card[data-qbschema="' + CSS.escape(sourceSchema) + '"]');
                var targetEl = canvasArea.querySelector('.qb-card[data-qbschema="' + CSS.escape(targetSchema) + '"]');
                if (!sourceEl || !targetEl) return;

                var sx = sourcePos.x + sourceEl.offsetWidth / 2;
                var sy = sourcePos.y + sourceEl.offsetHeight / 2;
                var tx = targetPos.x + targetEl.offsetWidth / 2;
                var ty = targetPos.y + targetEl.offsetHeight / 2;

                var dx = tx - sx;
                var dy = ty - sy;
                var cx = sx + dx * 0.5;
                var cy = sy + dy * 0.5 - Math.min(Math.abs(dx) * 0.12, 30);

                var pathD = 'M ' + sx + ' ' + sy + ' Q ' + cx + ' ' + cy + ' ' + tx + ' ' + ty;

                // Invisible wider hit-area path for easier clicking
                var hitArea = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                hitArea.setAttribute('d', pathD);
                hitArea.setAttribute('class', 'qb-join-hitarea');
                hitArea.setAttribute('data-qbjoinindex', index);
                svg.appendChild(hitArea);

                // Visible line
                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathD);
                path.setAttribute('class', 'qb-join-line ' + join.type);
                svg.appendChild(path);

                // Tooltip
                var tooltipText = join.type === 'inner' ? 'INNER JOIN — both sides must match'
                    : join.type === 'left' ? 'LEFT JOIN — all base rows kept, joined may be NULL'
                    : 'RIGHT JOIN — all joined rows kept, base may be NULL';
                var title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                title.textContent = tooltipText;
                path.appendChild(title);
                var hitTitle = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                hitTitle.textContent = tooltipText + ' (click to change)';
                hitArea.appendChild(hitTitle);

                // Draw endpoint indicators (colored per type)
                var dotRadius = 5;
                var sourceFill = (join.type === 'right') ? 'hollow' : 'filled';
                var targetFill = (join.type === 'left') ? 'hollow' : 'filled';

                var dot1 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot1.setAttribute('cx', sx); dot1.setAttribute('cy', sy); dot1.setAttribute('r', dotRadius);
                dot1.setAttribute('class', 'qb-join-dot ' + sourceFill + ' ' + join.type);
                svg.appendChild(dot1);
                var dot2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot2.setAttribute('cx', tx); dot2.setAttribute('cy', ty); dot2.setAttribute('r', dotRadius);
                dot2.setAttribute('class', 'qb-join-dot ' + targetFill + ' ' + join.type);
                svg.appendChild(dot2);

                // Clickable label to cycle join type
                var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', cx);
                label.setAttribute('y', cy - 10);
                label.setAttribute('class', 'qb-join-label');
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('data-qbjoinindex', index);
                label.textContent = join.type.toUpperCase() + ' JOIN';
                svg.appendChild(label);

                // Click handlers for label and hit area
                label.addEventListener('click', function() { cycleJoinType(index); });
                hitArea.addEventListener('click', function() { cycleJoinType(index); });
            });
        }

        // ── QB: Canvas Card Drag ─────────────────────────────
        function onQbCanvasMouseDown(e) {
            var header = e.target.closest('[data-qbdrag]');
            if (!header) return;
            var sc = header.dataset.qbdrag;
            var pos = queryBuilderState.loaded.get(sc);
            if (!pos) return;
            qbDragState = { schemaClass: sc, startX: e.clientX, startY: e.clientY, origX: pos.x, origY: pos.y };
            e.preventDefault();
        }

        function onQbCanvasMouseMove(e) {
            if (!qbDragState) return;
            var newX = Math.max(0, qbDragState.origX + (e.clientX - qbDragState.startX) / qbZoom);
            var newY = Math.max(0, qbDragState.origY + (e.clientY - qbDragState.startY) / qbZoom);
            queryBuilderState.loaded.set(qbDragState.schemaClass, { x: newX, y: newY });
            var card = document.querySelector('.qb-card[data-qbschema="' + CSS.escape(qbDragState.schemaClass) + '"]');
            if (card) card.style.transform = 'translate(' + newX + 'px,' + newY + 'px)';
            drawJoinLines();
        }

        function onQbCanvasMouseUp() {
            if (qbDragState) {
                updateCanvasSizer();
                qbDragState = null;
            }
        }

        // ── QB: Bottom Panel ──────────────────────────────
        function switchQbPanel(panel) {
            qbActivePanel = panel;
            document.querySelectorAll('.qb-panel-tab').forEach(function(b) {
                b.classList.toggle('active', b.dataset.qbpanel === panel);
            });
            document.getElementById('qb-panel-conditions').hidden = panel !== 'conditions';
            document.getElementById('qb-panel-sorts').hidden = panel !== 'sorts';
            document.getElementById('qb-panel-output').hidden = panel !== 'output';
        }

        function renderBottomPanel() {
            renderConditionsPanel();
            renderSortsPanel();
            renderOutputPanel();
        }

        function getAvailableColumns() {
            var columns = [];
            queryBuilderState.loaded.forEach(function(_, schemaClass) {
                var schema = schemaData.schemas[schemaClass];
                if (!schema) return;
                schema.columns.forEach(function(col) {
                    columns.push(schema.tableName + '.' + col.name);
                });
            });
            return columns;
        }

        // ── QB: Fuzzy Column Search & Picker ────────────────

        function fuzzyMatch(query, text) {
            if (!query) return { score: 0, indices: [] };
            var qi = 0, indices = [], score = 0, lastIdx = -1;
            var qLower = query.toLowerCase(), tLower = text.toLowerCase();
            for (var ti = 0; ti < tLower.length && qi < qLower.length; ti++) {
                if (tLower[ti] === qLower[qi]) {
                    indices.push(ti);
                    // Bonus: consecutive match
                    if (ti === lastIdx + 1) score += 5;
                    // Bonus: start of word (after '.' or '_')
                    if (ti === 0 || text[ti - 1] === '.' || text[ti - 1] === '_') score += 10;
                    score += 1;
                    lastIdx = ti;
                    qi++;
                }
            }
            return qi === qLower.length ? { score: score, indices: indices } : null;
        }

        function highlightMatches(text, indices) {
            if (!indices || !indices.length) return escapeHtml(text);
            var result = '', idxSet = {};
            indices.forEach(function(i) { idxSet[i] = true; });
            for (var i = 0; i < text.length; i++) {
                var ch = escapeHtml(text[i]);
                result += idxSet[i] ? '<mark>' + ch + '</mark>' : ch;
            }
            return result;
        }

        var activeColumnPicker = null;

        function dismissColumnPicker() {
            if (activeColumnPicker) {
                if (activeColumnPicker.el && activeColumnPicker.el.parentNode) {
                    activeColumnPicker.el.remove();
                }
                document.removeEventListener('click', activeColumnPicker.outsideHandler);
                document.removeEventListener('keydown', activeColumnPicker.keyHandler);
                activeColumnPicker = null;
            }
        }

        function showColumnPicker(anchorEl, currentValue, onSelect) {
            dismissColumnPicker();

            var columns = getAvailableColumns();
            // Group columns by table
            var grouped = {};
            columns.forEach(function(col) {
                var parts = col.split('.');
                var table = parts[0];
                var colName = parts.slice(1).join('.');
                if (!grouped[table]) grouped[table] = [];
                grouped[table].push({ full: col, name: colName });
            });
            var tableNames = Object.keys(grouped);

            var picker = document.createElement('div');
            picker.className = 'qb-col-picker';
            picker.innerHTML = '<input class="qb-col-picker-search" type="text" placeholder="Search columns...">' +
                '<div class="qb-col-picker-results"></div>';
            document.body.appendChild(picker);

            var searchInput = picker.querySelector('.qb-col-picker-search');
            var resultsEl = picker.querySelector('.qb-col-picker-results');
            var highlightedIdx = -1;
            var flatItems = []; // current visible items

            function renderResults(query) {
                var html = '';
                flatItems = [];
                if (!query) {
                    // Show all grouped
                    tableNames.forEach(function(table) {
                        html += '<div class="qb-col-picker-group-label">' + escapeHtml(table) + '</div>';
                        grouped[table].forEach(function(col) {
                            var sel = col.full === currentValue ? ' selected' : '';
                            flatItems.push(col.full);
                            html += '<div class="qb-col-picker-item' + sel + '" data-value="' + escapeAttr(col.full) + '">' +
                                escapeHtml(col.name) + '</div>';
                        });
                    });
                } else {
                    // Fuzzy filter + rank
                    var matches = [];
                    columns.forEach(function(col) {
                        var m = fuzzyMatch(query, col);
                        if (m) matches.push({ col: col, score: m.score, indices: m.indices });
                    });
                    matches.sort(function(a, b) { return b.score - a.score; });

                    if (matches.length === 0) {
                        html = '<div class="qb-col-picker-empty">No matching columns</div>';
                    } else {
                        // Group matched results by table
                        var matchGrouped = {};
                        matches.forEach(function(m) {
                            var parts = m.col.split('.');
                            var table = parts[0];
                            if (!matchGrouped[table]) matchGrouped[table] = [];
                            matchGrouped[table].push(m);
                        });
                        // Render in score order but grouped
                        var seenTables = {};
