                        matches.forEach(function(m) {
                            var parts = m.col.split('.');
                            var table = parts[0];
                            if (!seenTables[table]) {
                                seenTables[table] = true;
                                html += '<div class="qb-col-picker-group-label">' + escapeHtml(table) + '</div>';
                                matchGrouped[table].forEach(function(item) {
                                    var sel = item.col === currentValue ? ' selected' : '';
                                    flatItems.push(item.col);
                                    html += '<div class="qb-col-picker-item' + sel + '" data-value="' + escapeAttr(item.col) + '">' +
                                        highlightMatches(item.col.split('.').slice(1).join('.'), item.indices.filter(function(i) { return i > item.col.indexOf('.'); }).map(function(i) { return i - item.col.indexOf('.') - 1; })) + '</div>';
                                });
                            }
                        });
                    }
                }
                resultsEl.innerHTML = html;
                highlightedIdx = -1;
                updateHighlight();

                // Bind click on items
                resultsEl.querySelectorAll('.qb-col-picker-item').forEach(function(item) {
                    item.addEventListener('mousedown', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        selectItem(item.dataset.value);
                    });
                });
            }

            function updateHighlight() {
                var items = resultsEl.querySelectorAll('.qb-col-picker-item');
                items.forEach(function(el, i) {
                    el.classList.toggle('highlighted', i === highlightedIdx);
                });
                if (highlightedIdx >= 0 && items[highlightedIdx]) {
                    items[highlightedIdx].scrollIntoView({ block: 'nearest' });
                }
            }

            function selectItem(value) {
                dismissColumnPicker();
                onSelect(value);
            }

            // Position below anchor
            var rect = anchorEl.getBoundingClientRect();
            var spaceBelow = window.innerHeight - rect.bottom;
            var spaceAbove = rect.top;
            picker.style.left = Math.max(4, Math.min(window.innerWidth - 264, rect.left)) + 'px';
            if (spaceBelow >= 200 || spaceBelow >= spaceAbove) {
                picker.style.top = (rect.bottom + 2) + 'px';
            } else {
                picker.style.bottom = (window.innerHeight - rect.top + 2) + 'px';
            }

            // Keyboard handler
            function onKeyDown(e) {
                if (e.key === 'Escape') { dismissColumnPicker(); e.preventDefault(); return; }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (highlightedIdx < flatItems.length - 1) highlightedIdx++;
                    updateHighlight();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (highlightedIdx > 0) highlightedIdx--;
                    else highlightedIdx = 0;
                    updateHighlight();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (highlightedIdx >= 0 && flatItems[highlightedIdx]) {
                        selectItem(flatItems[highlightedIdx]);
                    }
                }
            }

            // Outside click handler
            function onOutsideClick(e) {
                if (!picker.contains(e.target) && e.target !== anchorEl) {
                    dismissColumnPicker();
                }
            }

            activeColumnPicker = {
                el: picker,
                outsideHandler: onOutsideClick,
                keyHandler: onKeyDown
            };

            searchInput.addEventListener('input', function() {
                renderResults(searchInput.value.trim());
            });

            renderResults('');
            searchInput.focus();

            // Defer outside-click binding (prevent instant dismissal)
            setTimeout(function() {
                document.addEventListener('click', onOutsideClick);
                document.addEventListener('keydown', onKeyDown);
            }, 0);
        }

        // ── QB: Condition Tree Helpers ─────────────────────
        // Conditions use a tree structure: each node is either
        //   { type: 'condition', column, operator, value, boolean, parameter }
        //   { type: 'group', boolean, children: [...nodes...] }
        // Nodes are addressed by path strings: "0", "2", "1-0", "1-2-0" etc.

        function getNodeByPath(path) {
            var parts = path.split('-').map(Number);
            var arr = queryBuilderState.conditions;
            for (var i = 0; i < parts.length - 1; i++) {
                arr = arr[parts[i]].children;
            }
            return arr[parts[parts.length - 1]];
        }

        function getParentArray(path) {
            var parts = path.split('-').map(Number);
            var arr = queryBuilderState.conditions;
            for (var i = 0; i < parts.length - 1; i++) {
                arr = arr[parts[i]].children;
            }
            return { arr: arr, index: parts[parts.length - 1] };
        }

        function removeNodeByPath(path) {
            var ref = getParentArray(path);
            ref.arr.splice(ref.index, 1);
        }

        function addChildCondition(path) {
            var node = getNodeByPath(path);
            if (node.type === 'group' || node.type === 'whereHas') {
                node.children.push({ type: 'condition', column: '', operator: '=', value: '', boolean: 'and', valueType: 'dynamic' });
            }
        }

        function addChildGroup(path) {
            var node = getNodeByPath(path);
            if (node.type === 'group') {
                node.children.push({
                    type: 'group', boolean: 'and',
                    children: [{ type: 'condition', column: '', operator: '=', value: '', boolean: 'and', valueType: 'dynamic' }]
                });
            }
        }

        // ── QB: Conditions ────────────────────────────────
        function renderConditionsPanel() {
            var container = document.getElementById('qb-panel-conditions');
            var html = renderConditionNodes(queryBuilderState.conditions, 0, '');

            html += '<div style="display:flex;gap:6px;margin-top:6px">';
            html += '<button class="qb-add-row-btn" id="qb-add-condition">+ Add Condition</button>';
            html += '<button class="qb-add-row-btn" id="qb-add-group">+ Add Group</button>';
            html += '</div>';
            container.innerHTML = html;

            // Bind top-level buttons
            document.getElementById('qb-add-condition').addEventListener('click', addCondition);
            document.getElementById('qb-add-group').addEventListener('click', addGroup);

            // Bind all condition rows and group elements
            bindConditionEvents(container);
        }

        function renderConditionNodes(nodes, depth, pathPrefix) {
            var html = '';
            var operators = ['=', '!=', '>', '<', '>=', '<=', 'like', 'in', 'not_in', 'is_null', 'is_not_null', 'between'];

            nodes.forEach(function(node, index) {
                var path = pathPrefix ? pathPrefix + '-' + index : '' + index;
                var isFirst = (index === 0 && depth === 0);

                if (node.type === 'group') {
                    var depthClass = 'depth-' + (depth % 4);
                    html += '<div class="qb-condition-group ' + depthClass + '" data-condpath="' + escapeAttr(path) + '">';

                    // Group header
                    html += '<div class="qb-group-header">';
                    if (!isFirst) {
                        html += '<select class="cond-boolean group-boolean">' +
                            '<option value="and"' + (node.boolean === 'and' ? ' selected' : '') + '>AND</option>' +
                            '<option value="or"' + (node.boolean === 'or' ? ' selected' : '') + '>OR</option>' +
                            '</select>';
                    } else {
                        html += '<select class="cond-boolean" disabled><option>WHERE</option></select>';
                    }
                    html += '<span class="qb-group-label">Group</span>';
                    html += '<div class="qb-group-actions">';
                    html += '<button class="add-cond-to-group" data-grouppath="' + escapeAttr(path) + '">+ Condition</button>';
                    html += '<button class="add-subgroup" data-grouppath="' + escapeAttr(path) + '">+ Sub-Group</button>';
                    html += '<button class="remove-group" data-condpath="' + escapeAttr(path) + '">&times;</button>';
                    html += '</div></div>';

                    // Group children
                    html += renderConditionNodes(node.children || [], depth + 1, path);
                    html += '</div>';
                } else if (node.type === 'whereHas') {
                    // whereHas relationship block
                    html += '<div class="qb-where-has-block" data-condpath="' + escapeAttr(path) + '">';
                    html += '<div class="qb-where-has-header">';

                    // Boolean (AND/OR) or WHERE for first
                    if (!isFirst) {
                        html += '<select class="cond-boolean wh-boolean">' +
                            '<option value="and"' + (node.boolean === 'and' ? ' selected' : '') + '>AND</option>' +
                            '<option value="or"' + (node.boolean === 'or' ? ' selected' : '') + '>OR</option>' +
                            '</select>';
                    } else {
                        html += '<select class="cond-boolean" disabled><option>WHERE</option></select>';
                    }

                    // has/doesntHave toggle
                    html += '<div class="qb-wh-has-toggle">' +
                        '<button class="wh-has-btn' + (node.hasType !== 'doesntHave' ? ' active' : '') + '">HAS</button>' +
                        '<button class="wh-doesnt-have-btn' + (node.hasType === 'doesntHave' ? ' active' : '') + '">DOESN\'T HAVE</button>' +
                        '</div>';

                    // Relationship name badge
                    html += '<span class="qb-wh-relationship-badge">⊃⊂ ' + escapeHtml(node.relationship) + '</span>';

                    // Count constraint
                    html += '<div class="qb-wh-count-group">';
                    html += '<select class="wh-count-operator">' +
                        '<option value=""' + (!node.countOperator ? ' selected' : '') + '>any count</option>' +
                        '<option value=">="' + (node.countOperator === '>=' ? ' selected' : '') + '>&ge;</option>' +
                        '<option value=">"' + (node.countOperator === '>' ? ' selected' : '') + '>&gt;</option>' +
                        '<option value="="' + (node.countOperator === '=' ? ' selected' : '') + '>=</option>' +
                        '<option value="<"' + (node.countOperator === '<' ? ' selected' : '') + '>&lt;</option>' +
                        '<option value="<="' + (node.countOperator === '<=' ? ' selected' : '') + '>&le;</option>' +
                        '</select>';
                    var showCount = !!node.countOperator;
                    html += '<input type="number" class="wh-count-value" min="1" value="' + (node.countValue || 1) + '"' + (!showCount ? ' style="display:none"' : '') + '>';
                    html += '</div>';

                    // Actions
                    html += '<div class="qb-wh-actions">';
                    html += '<button class="add-cond-to-wh" data-grouppath="' + escapeAttr(path) + '">+ Condition</button>';
                    html += '<button class="remove-where-has" data-condpath="' + escapeAttr(path) + '">&times;</button>';
                    html += '</div>';
                    html += '</div>';

                    // Nested children (conditions on the related model's columns)
                    html += renderConditionNodes(node.children || [], depth + 1, path);
                    html += '</div>';
                } else {
                    // Regular condition row
                    var valueType = node.valueType || (node.parameter ? 'dynamic' : 'hardcoded');
                    var isDynamic = valueType === 'dynamic';
                    var isReference = valueType === 'reference';
                    var rowClass = isDynamic ? ' dynamic' : (isReference ? ' reference' : '');
                    html += '<div class="qb-condition-row' + rowClass + '" data-condpath="' + escapeAttr(path) + '">';
                    if (isFirst) {
                        html += '<select class="cond-boolean" disabled><option>WHERE</option></select>';
                    } else {
                        html += '<select class="cond-boolean">' +
                            '<option value="and"' + (node.boolean === 'and' ? ' selected' : '') + '>AND</option>' +
                            '<option value="or"' + (node.boolean === 'or' ? ' selected' : '') + '>OR</option>' +
                            '</select>';
                    }
                    var colDisplay = node.column ? escapeHtml(node.column) : 'Select column...';
                    var colPlaceholderCls = node.column ? '' : ' placeholder';
                    html += '<button class="cond-column qb-col-picker-trigger" data-value="' + escapeAttr(node.column || '') + '">' +
                        '<span class="col-text' + colPlaceholderCls + '">' + colDisplay + '</span>' +
                        '<span class="col-chevron">&#9662;</span></button>';

                    // Operator: restrict to comparisons when in reference mode
                    var allowedOps = isReference
                        ? operators.filter(function(op) { return ['=', '!=', '>', '<', '>=', '<='].indexOf(op) !== -1; })
                        : operators;
                    html += '<select class="cond-operator">';
                    allowedOps.forEach(function(op) {
                        html += '<option value="' + escapeAttr(op) + '"' + (node.operator === op ? ' selected' : '') + '>' + escapeHtml(op) + '</option>';
                    });
                    html += '</select>';

                    var hideValue = node.operator === 'is_null' || node.operator === 'is_not_null';
                    if (isDynamic) {
                        var paramName = node.column ? '$' + node.column.replace(/^[^.]*\./, '').replace(/_([a-z])/g, function(_, c) { return c.toUpperCase(); }) : '$value';
                        html += '<span class="cond-param-preview">' + escapeHtml(paramName) + '</span>';
                        html += '<input type="text" class="cond-value" style="display:none" value="' + escapeAttr(node.value || '') + '">';
                    } else if (isReference) {
                        var refColDisplay = node.referenceColumn ? escapeHtml(node.referenceColumn) : 'Select column...';
                        var refColPlaceholderCls = node.referenceColumn ? '' : ' placeholder';
                        html += '<button class="cond-ref-column qb-col-picker-trigger" data-value="' + escapeAttr(node.referenceColumn || '') + '">' +
                            '<span class="col-text' + refColPlaceholderCls + '">' + refColDisplay + '</span>' +
                            '<span class="col-chevron">&#9662;</span></button>';
                        html += '<input type="text" class="cond-value" style="display:none" value="' + escapeAttr(node.value || '') + '">';
                    } else {
                        html += '<input type="text" class="cond-value" placeholder="Value..." value="' + escapeAttr(node.value || '') + '"' + (hideValue ? ' style="visibility:hidden"' : '') + '>';
                    }

                    html += '<div class="cond-param-toggle">' +
                        '<button class="cond-param-dynamic' + (isDynamic ? ' active' : '') + '">Dynamic</button>' +
                        '<button class="cond-param-hardcoded' + (valueType === 'hardcoded' ? ' active' : '') + '">Hardcoded</button>' +
                        '<button class="cond-param-reference' + (isReference ? ' active' : '') + '">Column</button>' +
                        '</div>';
                    html += '<button class="cond-remove" data-condpath="' + escapeAttr(path) + '">&times;</button>';
                    html += '</div>';
                }
            });
            return html;
        }

        function bindConditionEvents(container) {
            // Remove buttons (conditions and groups)
            container.querySelectorAll('.cond-remove, .remove-group').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    removeNodeByPath(btn.dataset.condpath);
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
            });

            // Group action buttons
            container.querySelectorAll('.add-cond-to-group').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    addChildCondition(btn.dataset.grouppath);
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
            });
            container.querySelectorAll('.add-subgroup').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    addChildGroup(btn.dataset.grouppath);
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
            });

            // Condition row fields
            container.querySelectorAll('.qb-condition-row[data-condpath]').forEach(function(row) {
                var path = row.dataset.condpath;
                var boolSel = row.querySelector(':scope > .cond-boolean');
                var colBtn = row.querySelector(':scope > .cond-column.qb-col-picker-trigger');
                var opSel = row.querySelector(':scope > .cond-operator');
                var valInput = row.querySelector(':scope > .cond-value');

                if (boolSel && !boolSel.disabled) {
                    boolSel.addEventListener('change', function() {
                        getNodeByPath(path).boolean = boolSel.value;
                        queryBuilderState.dirty = true;
                    });
                }
                if (colBtn) colBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showColumnPicker(colBtn, colBtn.dataset.value, function(val) {
                        getNodeByPath(path).column = val;
                        queryBuilderState.dirty = true;
                        renderConditionsPanel();
                    });
                });
                if (opSel) opSel.addEventListener('change', function() {
                    getNodeByPath(path).operator = opSel.value;
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
                if (valInput) valInput.addEventListener('input', function() {
                    getNodeByPath(path).value = valInput.value;
                    queryBuilderState.dirty = true;
                });
                var dynBtn = row.querySelector(':scope > .cond-param-toggle .cond-param-dynamic');
                var hardBtn = row.querySelector(':scope > .cond-param-toggle .cond-param-hardcoded');
                var refBtn = row.querySelector(':scope > .cond-param-toggle .cond-param-reference');
                if (dynBtn) dynBtn.addEventListener('click', function() {
                    var node = getNodeByPath(path);
                    node.valueType = 'dynamic';
                    delete node.parameter;
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
                if (hardBtn) hardBtn.addEventListener('click', function() {
                    var node = getNodeByPath(path);
                    node.valueType = 'hardcoded';
                    delete node.parameter;
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
                if (refBtn) refBtn.addEventListener('click', function() {
                    var node = getNodeByPath(path);
                    node.valueType = 'reference';
                    delete node.parameter;
                    // Reset to a comparison operator if current one isn't supported
                    if (['=', '!=', '>', '<', '>=', '<='].indexOf(node.operator) === -1) {
                        node.operator = '=';
                    }
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
                var refColBtn = row.querySelector(':scope > .cond-ref-column.qb-col-picker-trigger');
                if (refColBtn) refColBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showColumnPicker(refColBtn, refColBtn.dataset.value, function(val) {
                        getNodeByPath(path).referenceColumn = val;
                        queryBuilderState.dirty = true;
                        renderConditionsPanel();
                    });
                });
            });

            // Group boolean selectors
            container.querySelectorAll('.qb-condition-group[data-condpath]').forEach(function(groupEl) {
                var path = groupEl.dataset.condpath;
                var boolSel = groupEl.querySelector(':scope > .qb-group-header > .group-boolean');
                if (boolSel) {
                    boolSel.addEventListener('change', function() {
                        getNodeByPath(path).boolean = boolSel.value;
                        queryBuilderState.dirty = true;
                    });
                }
            });

            // whereHas blocks
            container.querySelectorAll('.qb-where-has-block[data-condpath]').forEach(function(whEl) {
                var path = whEl.dataset.condpath;

                // Boolean (AND/OR)
                var boolSel = whEl.querySelector(':scope > .qb-where-has-header > .wh-boolean');
                if (boolSel) {
                    boolSel.addEventListener('change', function() {
                        getNodeByPath(path).boolean = boolSel.value;
                        queryBuilderState.dirty = true;
                    });
                }

                // has/doesntHave toggle
                var hasBtn = whEl.querySelector(':scope > .qb-where-has-header .wh-has-btn');
                var doesntBtn = whEl.querySelector(':scope > .qb-where-has-header .wh-doesnt-have-btn');
                if (hasBtn) hasBtn.addEventListener('click', function() {
                    getNodeByPath(path).hasType = 'has';
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
                if (doesntBtn) doesntBtn.addEventListener('click', function() {
                    getNodeByPath(path).hasType = 'doesntHave';
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });

                // Count operator
                var countOpSel = whEl.querySelector(':scope > .qb-where-has-header .wh-count-operator');
                var countValInput = whEl.querySelector(':scope > .qb-where-has-header .wh-count-value');
                if (countOpSel) countOpSel.addEventListener('change', function() {
                    var node = getNodeByPath(path);
                    node.countOperator = countOpSel.value || null;
                    if (!node.countOperator) {
                        node.countValue = null;
                    } else if (!node.countValue) {
                        node.countValue = 1;
                    }
                    queryBuilderState.dirty = true;
                    renderConditionsPanel();
                });
                if (countValInput) countValInput.addEventListener('input', function() {
                    var node = getNodeByPath(path);
                    node.countValue = parseInt(countValInput.value, 10) || null;
                    queryBuilderState.dirty = true;
                });

                // Add condition to whereHas
                whEl.querySelectorAll('.add-cond-to-wh').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        addChildCondition(btn.dataset.grouppath);
                        queryBuilderState.dirty = true;
                        renderConditionsPanel();
                    });
                });

                // Remove whereHas
                whEl.querySelectorAll('.remove-where-has').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        removeNodeByPath(btn.dataset.condpath);
                        queryBuilderState.dirty = true;
                        renderConditionsPanel();
                    });
                });
            });
        }

        function addCondition() {
            queryBuilderState.conditions.push({
                type: 'condition',
                column: '',
                operator: '=',
                value: '',
                boolean: 'and',
                valueType: 'dynamic',
            });
            queryBuilderState.dirty = true;
            renderConditionsPanel();
        }

        function addGroup() {
            queryBuilderState.conditions.push({
                type: 'group',
                boolean: 'or',
                children: [{ type: 'condition', column: '', operator: '=', value: '', boolean: 'and', valueType: 'dynamic' }],
            });
            queryBuilderState.dirty = true;
            renderConditionsPanel();
        }

        function addConditionFromColumn(column, colType) {
            // Choose smart default operator based on column type
            var operator = '=';
            var lowerType = (colType || '').toLowerCase();
            if (lowerType.indexOf('date') !== -1 || lowerType.indexOf('timestamp') !== -1 || lowerType === 'datetime') {
                operator = 'between';
            } else if (lowerType === 'string' || lowerType === 'text' || lowerType === 'varchar' || lowerType === 'char') {
                operator = 'like';
            } else if (lowerType === 'boolean' || lowerType === 'bool' || lowerType === 'tinyint') {
                operator = '=';
            }

            queryBuilderState.conditions.push({
                type: 'condition',
                column: column,
                operator: operator,
                value: '',
                boolean: 'and',
                valueType: 'dynamic',
            });
            queryBuilderState.dirty = true;

            // Switch to conditions tab, uncollapse panel, and render
            switchQbPanel('conditions');
            if (qbPanelCollapsed) togglePanelCollapse();
            renderConditionsPanel();

            // Scroll to the newly added condition
            setTimeout(function() {
                var panelContent = document.querySelector('.qb-panel-content');
                if (panelContent) panelContent.scrollTop = panelContent.scrollHeight;
            }, 50);
        }

        function removeCondition(index) {
            queryBuilderState.conditions.splice(index, 1);
            queryBuilderState.dirty = true;
            renderConditionsPanel();
        }

        // ── QB: Sorts ─────────────────────────────────────
        function renderSortsPanel() {
            var container = document.getElementById('qb-panel-sorts');
            var html = '';

            queryBuilderState.sorts.forEach(function(sort, index) {
                html += '<div class="qb-sort-row" data-sortindex="' + index + '">';
                var sortColDisplay = sort.column ? escapeHtml(sort.column) : 'Select column...';
                var sortColPlaceholderCls = sort.column ? '' : ' placeholder';
                html += '<button class="sort-column qb-col-picker-trigger" data-value="' + escapeAttr(sort.column || '') + '">' +
                    '<span class="col-text' + sortColPlaceholderCls + '">' + sortColDisplay + '</span>' +
                    '<span class="col-chevron">&#9662;</span></button>';
                html += '<select class="sort-direction">' +
                    '<option value="asc"' + (sort.direction === 'asc' ? ' selected' : '') + '>ASC</option>' +
                    '<option value="desc"' + (sort.direction === 'desc' ? ' selected' : '') + '>DESC</option>' +
                    '</select>';
                html += '<button class="cond-remove" data-sortremove="' + index + '">&times;</button>';
                html += '</div>';
            });

            html += '<button class="qb-add-row-btn" id="qb-add-sort">+ Add Sort</button>';
            container.innerHTML = html;

            document.getElementById('qb-add-sort').addEventListener('click', addSort);
            container.querySelectorAll('.cond-remove[data-sortremove]').forEach(function(btn) {
                btn.addEventListener('click', function() { removeSort(parseInt(btn.dataset.sortremove, 10)); });
            });
            container.querySelectorAll('.qb-sort-row').forEach(function(row) {
                var idx = parseInt(row.dataset.sortindex, 10);
                var colBtn = row.querySelector('.sort-column.qb-col-picker-trigger');
                var dirSel = row.querySelector('.sort-direction');
                if (colBtn) colBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showColumnPicker(colBtn, colBtn.dataset.value, function(val) {
                        queryBuilderState.sorts[idx].column = val;
                        queryBuilderState.dirty = true;
                        renderSortsPanel();
                    });
                });
                dirSel.addEventListener('change', function() {
                    queryBuilderState.sorts[idx].direction = dirSel.value;
                    queryBuilderState.dirty = true;
                });
            });
        }

        function addSort() {
            queryBuilderState.sorts.push({ column: '', direction: 'asc' });
            queryBuilderState.dirty = true;
            renderSortsPanel();
        }

        function removeSort(index) {
            queryBuilderState.sorts.splice(index, 1);
            queryBuilderState.dirty = true;
            renderSortsPanel();
        }

        // ── QB: Output Panel ──────────────────────────────
        async function fetchApiConfig() {
            if (qbApiConfig) return qbApiConfig;
            try {
                var resp = await fetch('/_schema-craft/api/query-config');
                qbApiConfig = await resp.json();
                if (!queryBuilderState.selectedApi) {
                    queryBuilderState.selectedApi = qbApiConfig.defaultApi || 'default';
                }
            } catch (e) {
                qbApiConfig = { apis: { 'default': {} }, defaultApi: 'default' };
                queryBuilderState.selectedApi = 'default';
            }
            return qbApiConfig;
        }

        function renderOutputPanel() {
            var container = document.getElementById('qb-panel-output');
            var html = '<div class="qb-output-options">' +
                '<input type="text" class="qb-name" id="qb-name-input" placeholder="Query name (camelCase)..." value="' + escapeAttr(queryBuilderState.name) + '">' +

        async function renderApiSelector() {
            var slot = document.getElementById('qb-api-selector-slot');
            if (!slot) return;

            var needsApi = queryBuilderState.output.apiEndpoint || queryBuilderState.output.inlineController;
            if (!needsApi) {
                slot.innerHTML = '';
                return;
            }

            var config = await fetchApiConfig();
            var apiKeys = Object.keys(config.apis || {});

            // Single API: no dropdown needed, auto-select it
            if (apiKeys.length <= 1) {
                queryBuilderState.selectedApi = apiKeys[0] || 'default';
                slot.innerHTML = '';
                return;
            }

            // Multiple APIs: show dropdown
            var selected = queryBuilderState.selectedApi || config.defaultApi || apiKeys[0];
            var optionsHtml = apiKeys.map(function(key) {
                return '<option value="' + escapeAttr(key) + '"' + (key === selected ? ' selected' : '') + '>' + escapeHtml(key) + '</option>';
            }).join('');

            slot.innerHTML = '<div class="qb-api-selector">' +
                '<label>API:</label>' +
                '<select id="qb-api-select">' + optionsHtml + '</select>' +
                '</div>';

            document.getElementById('qb-api-select').addEventListener('change', function(e) {
                queryBuilderState.selectedApi = e.target.value;
            });
        }

        // ── QB: Legacy Condition Unflattening (backward compat for old JSON) ──
        // Rebuild tree from { conditions: [...], conditionGroups: [...], whereHas: [...] }
        function unflattenConditions(conditions, conditionGroups, whereHasArr) {
            var result = [];

            if (!conditionGroups || conditionGroups.length === 0) {
                // No groups — return flat list as condition nodes
                result = (conditions || []).map(function(c) {
                    var node = {
                        type: 'condition',
                        column: c.column,
                        operator: c.operator || '=',
                        value: c.value || '',
                        boolean: c.boolean || 'and',
                        valueType: c.valueType || (c.parameter ? 'dynamic' : 'hardcoded'),
                    };
                    if (c.referenceColumn) node.referenceColumn = c.referenceColumn;
                    return node;
                });
            } else {
                // Build group map
                var groupMap = {};
                conditionGroups.forEach(function(g) {
                    groupMap[g.id] = {
                        type: 'group',
                        boolean: g.boolean || 'and',
                        parentGroupId: g.parentGroupId || null,
                        children: [],
                    };
                });

                // Assign conditions to groups
                (conditions || []).forEach(function(c) {
                    var node = {
                        type: 'condition',
                        column: c.column,
                        operator: c.operator || '=',
                        value: c.value || '',
                        boolean: c.boolean || 'and',
                        valueType: c.valueType || (c.parameter ? 'dynamic' : 'hardcoded'),
                    };
                    if (c.referenceColumn) node.referenceColumn = c.referenceColumn;
                    if (c.groupId && groupMap[c.groupId]) {
                        groupMap[c.groupId].children.push(node);
                    }
                });

                // Nest child groups into parent groups
                conditionGroups.forEach(function(g) {
                    if (g.parentGroupId && groupMap[g.parentGroupId]) {
                        groupMap[g.parentGroupId].children.push(groupMap[g.id]);
                    }
                });

                // Build top-level array: top-level conditions + top-level groups
                (conditions || []).forEach(function(c) {
                    if (!c.groupId) {
                        var node = {
                            type: 'condition',
                            column: c.column,
                            operator: c.operator || '=',
                            value: c.value || '',
                            boolean: c.boolean || 'and',
                            valueType: c.valueType || (c.parameter ? 'dynamic' : 'hardcoded'),
                        };
                        if (c.referenceColumn) node.referenceColumn = c.referenceColumn;
                        result.push(node);
                    }
                });
                conditionGroups.forEach(function(g) {
                    if (!g.parentGroupId) {
                        result.push(groupMap[g.id]);
                    }
                });
            }

            // Reconstruct whereHas nodes
            (whereHasArr || []).forEach(function(wh) {
                var children = (wh.conditions || []).map(function(c) {
                    return {
                        type: 'condition',
                        column: c.column,
                        operator: c.operator || '=',
                        value: c.value || '',
                        boolean: c.boolean || 'and',
                        valueType: c.valueType || (c.parameter ? 'dynamic' : 'hardcoded'),
                    };
                });
                result.push({
                    type: 'whereHas',
                    relationship: wh.relationship,
                    sourceModel: wh.sourceModel || '',
                    sourceSchema: wh.sourceSchema || null,
                    relatedSchema: wh.relatedSchema || null,
                    boolean: wh.boolean || 'and',
                    hasType: wh.hasType || 'has',
                    countOperator: wh.countOperator || null,
                    countValue: wh.countValue || null,
                    children: children,
                });
            });

            return result;
        }

        // ── QB: Build Query Definition ────────────────────
        function buildQueryDefinition() {
            var def = {
                name: queryBuilderState.name,
                baseModel: queryBuilderState.baseModel,
                baseSchema: queryBuilderState.baseSchema || null,
                baseTable: queryBuilderState.baseTable,
                joins: queryBuilderState.joins.map(function(j) {
                    return {
                        type: j.type,
                        table: j.table,
                        model: j.model,
                        localColumn: j.localColumn,
                        foreignColumn: j.foreignColumn,
                        alias: j.alias,
                        relationshipName: j.relationshipName,
                    };
                }),
                conditions: serializeConditionNodes(queryBuilderState.conditions),
                sorts: queryBuilderState.sorts.filter(function(s) { return s.column; }).map(function(s) {
                    return { column: s.column, direction: s.direction };
                }),
                output: {
                    scopeOnModel: queryBuilderState.output.scopeOnModel,
                    apiEndpoint: queryBuilderState.output.apiEndpoint,
                    inlineController: queryBuilderState.output.inlineController,
                },
            };
            if (queryBuilderState.selectedApi) {
                def.api = queryBuilderState.selectedApi;
            }
            return def;
        }

        function serializeConditionNodes(nodes) {
            return (nodes || []).filter(function(node) {
                if (node.type === 'condition' && !node.column) return false;
                return true;
            }).map(function(node) {
                if (node.type === 'condition') {
                    var obj = {
                        type: 'condition',
                        column: node.column,
                        operator: node.operator,
                        value: node.value,
                        boolean: node.boolean,
                        valueType: node.valueType || 'hardcoded',
                    };
                    if (node.referenceColumn) obj.referenceColumn = node.referenceColumn;
                    return obj;
                }
                if (node.type === 'group') {
                    return {
                        type: 'group',
                        boolean: node.boolean || 'and',
                        children: serializeConditionNodes(node.children || []),
                    };
                }
                if (node.type === 'whereHas') {
                    var wh = {
                        type: 'whereHas',
                        relationship: node.relationship,
                        sourceModel: node.sourceModel || '',
                        boolean: node.boolean || 'and',
                        hasType: node.hasType || 'has',
                        children: serializeConditionNodes(node.children || []),
                    };
                    if (node.countOperator) {
                        wh.countOperator = node.countOperator;
                        wh.countValue = node.countValue;
                    }
                    return wh;
                }
                return node;
            });
        }

        // ── QB: Actions ───────────────────────────────────
        async function saveCurrentQuery() {
            if (!queryBuilderState.name) {
                alert('Please enter a query name.');
                return;
            }
            if (!queryBuilderState.baseTable) {
                alert('Please select a base table first.');
                return;
            }

            var definition = buildQueryDefinition();
            var saveBtn = document.getElementById('qb-save-btn');
            var origText = saveBtn.textContent;
            saveBtn.textContent = 'Saving...';
            saveBtn.disabled = true;

            try {
                var resp = await fetch('/_schema-craft/api/queries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(definition),
                });
                var result = await resp.json();
                if (resp.ok) {
                    queryBuilderState.currentQuery = queryBuilderState.name;
                    queryBuilderState.dirty = false;
                    saveBtn.textContent = 'Saved!';
                    setTimeout(function() { saveBtn.textContent = origText; saveBtn.disabled = false; }, 1500);
                    await fetchSavedQueries();
                } else {
                    alert(result.message || 'Failed to save query.');
                    saveBtn.textContent = origText;
                    saveBtn.disabled = false;
                }
            } catch (e) {
                alert('Network error saving query.');
                saveBtn.textContent = origText;
                saveBtn.disabled = false;
            }
        }

        async function generateCode() {
            if (!queryBuilderState.baseTable) {
                alert('Please select a base table first.');
                return;
            }

            // Ensure API config is loaded so selectedApi is set
            await fetchApiConfig();
            var definition = buildQueryDefinition();
            var genBtn = document.getElementById('qb-generate-btn');
            var origText = genBtn.textContent;
            genBtn.textContent = 'Generating...';
            genBtn.disabled = true;

            try {
                var resp = await fetch('/_schema-craft/api/generate-query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(definition),
                });
                var result = await resp.json();
                genBtn.textContent = origText;
                genBtn.disabled = false;

                if (resp.ok) {

                genBtn.textContent = origText;
                genBtn.disabled = false;
            }
        }

        // ── QB: Result Modal ──────────────────────────────
        function showResultModal(title, result) {
            document.getElementById('qb-modal-title').textContent = title;
            var body = document.getElementById('qb-modal-body');
            var html = '';
            var blockIdx = 0;

            if (typeof result === 'string') {
                html += '<div class="qb-modal-code-block">' +
                    '<button class="qb-modal-copy" data-modalcopy="block-0">Copy</button>' +
                    '<pre class="qb-modal-code" id="modal-code-block-0">' + escapeHtml(result) + '</pre></div>';
            } else if (result.sql) {
                html += '<div class="qb-modal-code-block">' +
                    '<div class="qb-modal-code-label">SQL</div>' +
                    '<button class="qb-modal-copy" data-modalcopy="block-sql">Copy</button>' +
                    '<pre class="qb-modal-code" id="modal-code-block-sql">' + escapeHtml(result.sql) + '</pre></div>';
                if (result.bindings) {
                    html += '<div class="qb-modal-code-block">' +
                        '<div class="qb-modal-code-label">Bindings</div>' +
                        '<button class="qb-modal-copy" data-modalcopy="block-bindings">Copy</button>' +
                        '<pre class="qb-modal-code" id="modal-code-block-bindings">' + escapeHtml(JSON.stringify(result.bindings, null, 2)) + '</pre></div>';
                }
            } else if (result.generated) {
                // New format: { generated: { scope: {...}, ... }, written: { scope: {...}, ... } }
                var generated = result.generated || {};
                Object.keys(generated).forEach(function(key) {
                    var item = generated[key];
                    var label = item.description || item.type || key;
                    var code = item.code || '';
                    if (code) {
                        html += '<div class="qb-modal-code-block">' +
                            '<div class="qb-modal-code-label">' + escapeHtml(label) + '</div>' +
                            '<button class="qb-modal-copy" data-modalcopy="block-' + blockIdx + '">Copy</button>' +
                            '<pre class="qb-modal-code" id="modal-code-block-' + blockIdx + '">' + escapeHtml(code) + '</pre></div>';
                        blockIdx++;
                    }
                });

                // Written files section
                var written = result.written || {};
                var writtenKeys = Object.keys(written);
                if (writtenKeys.length > 0) {
                    html += '<div class="qb-modal-written-files">' +
                        '<div class="qb-modal-code-label">Written Files</div>';
                    writtenKeys.forEach(function(key) {
                        var w = written[key];
                        var icon = w.success ? '<span class="file-icon success">&#10003;</span>' : '<span class="file-icon failure">&#10007;</span>';
                        var filePath = w.filePath ? '<span class="qb-written-file-path">' + escapeHtml(w.filePath) + '</span>' : '';
                        var msg = w.message ? '<span class="qb-written-file-msg"> &mdash; ' + escapeHtml(w.message) + '</span>' : '';
                        html += '<div class="qb-written-file-item">' + icon + '<div>' + filePath + msg + '</div></div>';
                    });
                    html += '</div>';
                }

                // Index suggestions
                if (result.indexSuggestions && result.indexSuggestions.length > 0) {
                    html += '<div class="qb-modal-written-files" style="margin-top:12px">' +
                        '<div class="qb-modal-code-label">Index Suggestions</div>';
                    result.indexSuggestions.forEach(function(s) {
                        html += '<div class="qb-written-file-item"><span class="file-icon" style="color:var(--warning)">!</span>' +
                            '<div><span class="qb-written-file-msg">' + escapeHtml(typeof s === 'string' ? s : (s.suggestion || JSON.stringify(s))) + '</span></div></div>';
                    });
                    html += '</div>';
                }
            } else {
                // Fallback: dump as JSON
                html += '<div class="qb-modal-code-block">' +
                    '<button class="qb-modal-copy" data-modalcopy="block-0">Copy</button>' +
                    '<pre class="qb-modal-code" id="modal-code-block-0">' + escapeHtml(JSON.stringify(result, null, 2)) + '</pre></div>';
            }

            body.innerHTML = html;

            // Bind copy buttons
            body.querySelectorAll('.qb-modal-copy').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var codeEl = document.getElementById('modal-code-' + btn.dataset.modalcopy);
                    if (codeEl) {
                        navigator.clipboard.writeText(codeEl.textContent).then(function() {
                            btn.classList.add('copied');
                            btn.textContent = 'Copied!';
                            setTimeout(function() { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500);
                        });
                    }
                });
            });

            document.getElementById('qb-modal').hidden = false;
        }

            document.getElementById('qb-modal').hidden = true;
        }

        // ── QB: Join Info Modal ─────────────────────────────
        function showJoinInfoModal() {
            document.getElementById('qb-modal-title').textContent = 'Understanding Join Types';
            var body = document.getElementById('qb-modal-body');
            body.innerHTML =
                // INNER JOIN
                '<div class="qb-info-section">' +
                    '<div class="qb-info-section-header">' +
                        '<span class="qb-info-section-icon" style="color:var(--accent)">●━━●</span>' +
                        '<span class="qb-info-section-title" style="color:var(--accent)">INNER JOIN</span>' +
                    '</div>' +
                    '<p>Returns <strong>only rows where both tables have a matching record</strong>. If a base row has no related row, it is excluded entirely.</p>' +
                    '<p><span class="qb-info-label use">Use when</span> You need columns from the related table in your SELECT or ORDER BY, <strong>and</strong> both sides must exist. Example: list all orders with their customer name — orders without a customer are excluded.</p>' +
                    '<p><span class="qb-info-label warn">Warning</span> One-to-many relationships (e.g., a post with 5 comments) will produce <strong>duplicate base rows</strong> — one row per matched related record. Use GROUP BY or DISTINCT to de-duplicate, or consider WHERE HAS if you only need filtering.</p>' +
                    '<code class="qb-info-code">Post::query()\n    ->join(\'comments\', \'comments.post_id\', \'=\', \'posts.id\')\n    ->select(\'posts.*\', \'comments.body\');</code>' +
                '</div>' +

                // LEFT JOIN
                '<div class="qb-info-section">' +
                    '<div class="qb-info-section-header">' +
                        '<span class="qb-info-section-icon" style="color:var(--info)">●━━○</span>' +
                        '<span class="qb-info-section-title" style="color:var(--info)">LEFT JOIN</span>' +
                    '</div>' +
                    '<p>Returns <strong>all base rows</strong>, with NULL values for the joined columns when no match exists on the related side.</p>' +
                    '<p><span class="qb-info-label use">Use when</span> You want to keep every base row even if the relationship is empty. Example: list all users and their latest order — users who never ordered still appear (with NULL order columns).</p>' +
                    '<p><span class="qb-info-label warn">Warning</span> Same duplicate risk as INNER JOIN for one-to-many relationships. Also watch for NULLs in aggregate functions — use COALESCE when needed.</p>' +
                    '<code class="qb-info-code">User::query()\n    ->leftJoin(\'orders\', \'orders.user_id\', \'=\', \'users.id\')\n    ->select(\'users.*\', DB::raw(\'COUNT(orders.id) as order_count\'))\n    ->groupBy(\'users.id\');</code>' +
                '</div>' +

                // RIGHT JOIN
                '<div class="qb-info-section">' +
                    '<div class="qb-info-section-header">' +
                        '<span class="qb-info-section-icon" style="color:var(--warning)">○━━●</span>' +
                        '<span class="qb-info-section-title" style="color:var(--warning)">RIGHT JOIN</span>' +
                    '</div>' +
                    '<p>Returns <strong>all rows from the joined table</strong>, with NULL for the base side when no match exists. This is the mirror of LEFT JOIN.</p>' +
                    '<p><span class="qb-info-label use">Use when</span> You want to ensure every related record appears even if the base row is missing. Rarely needed — typically you would swap the base table instead.</p>' +
                    '<p><span class="qb-info-label tip">Tip</span> Most SQL users prefer rewriting RIGHT JOINs as LEFT JOINs by reversing the table order. Included here for SQL completeness and advanced use cases.</p>' +
                '</div>' +

                // WHERE HAS
                '<div class="qb-info-section">' +
                    '<div class="qb-info-section-header">' +
                        '<span class="qb-info-section-icon" style="color:var(--success)">⊃⊂</span>' +
                        '<span class="qb-info-section-title" style="color:var(--success)">WHERE HAS (Subquery Filter)</span>' +
                    '</div>' +
                    '<p>Uses an <strong>EXISTS subquery</strong> to filter the base rows. Does <strong>NOT</strong> add columns to the result — it only checks for the existence of related records.</p>' +
                    '<p><span class="qb-info-label use">Use when</span> You only need to <strong>filter</strong> rows by a relationship without accessing the related columns. Example: "posts that have at least one approved comment" — no duplicates, no extra columns.</p>' +
                    '<p><strong>Key benefits:</strong></p>' +
                    '<p>• <strong>No duplicate rows</strong> — unlike JOINs, each base row appears at most once</p>' +
                    '<p>• <strong>Count constraints</strong> — filter by how many related records exist (e.g., "has &ge; 5 comments")</p>' +
                    '<p>• <strong>Negation</strong> — use "Doesn\'t Have" to find rows <em>without</em> related records</p>' +
                    '<p>• <strong>Nested conditions</strong> — add WHERE clauses on the related table inside the subquery</p>' +
                    '<code class="qb-info-code">// Has at least one approved comment\nPost::whereHas(\'comments\', function ($q) {\n    $q->where(\'approved\', true);\n});\n\n// Has 5 or more comments\nPost::has(\'comments\', \'>=\', 5);\n\n// Has NO comments\nPost::whereDoesntHave(\'comments\');</code>' +
                '</div>' +

                // Combining section
                '<hr class="qb-info-divider">' +
                '<div class="qb-info-section" style="border-color: var(--accent); border-style: dashed;">' +
                    '<div class="qb-info-section-header">' +
                        '<span class="qb-info-section-icon" style="color:var(--accent)">●━⊃⊂</span>' +
                        '<span class="qb-info-section-title">Combining JOIN + WHERE HAS</span>' +
                    '</div>' +
                    '<p>You can use <strong>both a JOIN and WHERE HAS</strong> on the same relationship. This is a powerful pattern for complex datasets:</p>' +
                    '<p>• <strong>JOIN</strong> to access related columns for SELECT, ORDER BY, or aggregation</p>' +
                    '<p>• <strong>WHERE HAS</strong> to filter precisely without duplicates or with count constraints</p>' +
                    '<p><span class="qb-info-label tip">Example</span> Join <code>comments</code> to show <code>comments.count</code> in your SELECT, and use whereHas <code>comments</code> to filter for posts with approved comments — clean, duplicate-free results with related data available.</p>' +
                    '<code class="qb-info-code">Post::query()\n    ->leftJoin(\'comments\', \'comments.post_id\', \'=\', \'posts.id\')\n    ->select(\'posts.*\', DB::raw(\'COUNT(comments.id) as comment_count\'))\n    ->groupBy(\'posts.id\')\n    ->whereHas(\'comments\', function ($q) {\n        $q->where(\'approved\', true);\n    });</code>' +
                    '<p>You can also add <strong>multiple WHERE HAS</strong> blocks on the same relationship with different conditions — each adds an independent EXISTS subquery.</p>' +
                '</div>';

            document.getElementById('qb-modal').hidden = false;
        }

        // ── QB: Helpers ───────────────────────────────────
        function findSchemaClassByModel(modelClass) {
            if (!modelClass || !schemaData) return null;
            var keys = Object.keys(schemaData.schemas);
            for (var i = 0; i < keys.length; i++) {
                var schema = schemaData.schemas[keys[i]];
                if (schema.modelClass === modelClass) return keys[i];
                // Also try matching by short name
                var shortModel = modelClass.split('\\').pop();
                var shortSchema = keys[i].split('\\').pop().replace(/Schema$/, '');
                if (shortModel === shortSchema) return keys[i];
            }
            return null;
        }

        function findSchemaClassByTable(tableName) {
            if (!tableName || !schemaData) return null;
            var keys = Object.keys(schemaData.schemas);
            for (var i = 0; i < keys.length; i++) {
                if (schemaData.schemas[keys[i]].tableName === tableName) return keys[i];
            }
            return null;
        }

        function showToast(message, type) {
            type = type || 'info';
            var icons = { success: '\u2713', error: '\u2717', warning: '\u26A0', info: '\u2139' };
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            toast.className = 'toast ' + type;
            toast.innerHTML = '<span class="toast-icon">' + (icons[type] || icons.info) + '</span>' +
                '<span>' + escapeHtml(message) + '</span>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.classList.add('fade-out');
                setTimeout(function() { toast.remove(); }, 300);
            }, 4000);
        }

        // ── Shared: File Preview Modal ──────────────────
        function showFilePreviewModal(files, onConfirm, confirmLabel) {
            confirmLabel = confirmLabel || 'Write Files';
            var overlay = document.createElement('div');
            overlay.className = 'fp-overlay';

            var newCount = files.filter(function(f) { return !f.exists; }).length;
            var existsCount = files.filter(function(f) { return f.exists; }).length;
            var summaryText = files.length + ' file(s): ' + newCount + ' new' + (existsCount ? ', ' + existsCount + ' existing' : '');

            var fileListHtml = files.map(function(f, idx) {
                var badge = f.exists ? '<span class="fp-file-badge exists">Exists</span>'
                    : '<span class="fp-file-badge new">New</span>';
                return '<div class="fp-file-item' + (idx === 0 ? ' active' : '') + '" data-fp-idx="' + idx + '">' +
                    '<span class="fp-file-path">' + escapeHtml(f.path) + '</span>' + badge + '</div>';
            }).join('');

            overlay.innerHTML =
                '<div class="fp-modal">' +
                    '<div class="fp-header">' +
                        '<span class="fp-header-title">File Preview</span>' +
                        '<button class="fp-close" id="fp-close">&times;</button>' +
                    '</div>' +
                    '<div class="fp-body">' +
                        '<div class="fp-file-list">' + fileListHtml + '</div>' +
                        '<div class="fp-code-panel">' +
                            '<div class="fp-code-header" id="fp-code-header">' + escapeHtml(files[0].path) + '</div>' +
                            '<pre class="fp-code-content" id="fp-code-content">' + escapeHtml(files[0].content || '') + '</pre>' +
                        '</div>' +
                    '</div>' +
                    '<div class="fp-footer">' +
                        '<span class="fp-summary">' + summaryText + '</span>' +
                        '<button class="sc-btn" id="fp-cancel">Cancel</button>' +
                        '<button class="sc-btn primary" id="fp-confirm">' + escapeHtml(confirmLabel) + '</button>' +
                    '</div>' +
                '</div>';

            document.body.appendChild(overlay);

            // File selection
            overlay.querySelectorAll('.fp-file-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    overlay.querySelectorAll('.fp-file-item').forEach(function(i) { i.classList.remove('active'); });
                    item.classList.add('active');
                    var idx = parseInt(item.dataset.fpIdx, 10);
                    document.getElementById('fp-code-header').textContent = files[idx].path;
                    document.getElementById('fp-code-content').textContent = files[idx].content || '';
                });
            });

            function close() { overlay.remove(); }
            overlay.querySelector('#fp-close').addEventListener('click', close);
            overlay.querySelector('#fp-cancel').addEventListener('click', close);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });

            overlay.querySelector('#fp-confirm').addEventListener('click', function() {
                close();
                if (onConfirm) onConfirm();
            });
        }

            overlay.className = 'cd-overlay';

                '<div class="cd-modal">' +
                    '<div class="cd-title">' + escapeHtml(title) + '</div>' +
                    '<div class="cd-message">' + escapeHtml(message) + '</div>' +
                    '<div class="cd-actions">' +
                        '<button class="sc-btn" id="cd-cancel">Cancel</button>' +
                        '<button class="sc-btn primary" id="cd-confirm">Confirm</button>' +
                    '</div>' +
                '</div>';
            document.body.appendChild(overlay);

            function close() { overlay.remove(); }
            overlay.querySelector('#cd-cancel').addEventListener('click', close);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
            overlay.querySelector('#cd-confirm').addEventListener('click', function() {

            // Bind events

            document.getElementById('sc-import-preview').addEventListener('click', function() { doImportSchema(true); });

        function checkInstallStatus() {
            fetch('/_schema-craft/api/install/status')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    schemasState.baseModelInstalled = data.installed;
                    document.getElementById('sc-install-banner').hidden = data.installed;
                })
                .catch(function() {});
        }

        function doInstallBaseModel() {
            var btn = document.getElementById('sc-install-btn');
            btn.disabled = true;
            btn.textContent = 'Installing...';

            fetch('/_schema-craft/api/install', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' } })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        schemasState.baseModelInstalled = true;
                        document.getElementById('sc-install-banner').hidden = true;
                        showToast('BaseModel installed successfully', 'success');
                    } else {
                        showToast(data.message || 'Failed to install BaseModel', 'error');
                    }
                })
                .catch(function(e) { showToast('Error: ' + e.message, 'error'); })
                .finally(function() { btn.disabled = false; btn.textContent = 'Install BaseModel'; });
        }

        function getCreateFormData() {
            var names = document.getElementById('sc-create-names').value.trim();
            var pk = document.querySelector('input[name="sc-pk"]:checked');
            return {
                names: names,
                primaryKey: pk ? pk.value : 'auto',
                softDeletes: document.getElementById('sc-soft-deletes').checked,
                createModel: document.getElementById('sc-create-model').checked,
            };
        }

        function doCreateSchema(previewOnly) {
            var data = getCreateFormData();
            if (!data.names) {
                showToast('Please enter at least one schema name', 'warning');
                return;
            }

            var url = previewOnly ? '/_schema-craft/api/schema/create/preview' : '/_schema-craft/api/schema/create';

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(data),
            })
            .then(function(r) { return r.json(); })
            .then(function(result) {
                if (!result.success) {
                    showToast(result.message || 'Failed to create schemas', 'error');
                    return;
                }

                if (previewOnly) {
                    showFilePreviewModal(result.files, function() { doCreateSchema(false); }, 'Write Files');
                } else {
                    var count = result.files ? result.files.length : 0;
                    showToast(result.message || count + ' file(s) created', 'success');
                    loadDatabaseTables(); // Refresh import panel statuses
                    refreshSchemaData();
                }
            })
            .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
        }

        // ── DB Connections ────────────────────────────────
        function loadConnections() {
            fetch('/_schema-craft/api/connections')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var select = document.getElementById('sc-db-connection');
                    if (!select) return;
                    select.innerHTML = '';
                    data.connections.forEach(function(conn) {
                        var opt = document.createElement('option');
                        opt.value = conn.name;
                        var label = conn.name;
                        if (conn.schemaPrefix) label += ' (prefix: ' + conn.schemaPrefix + ')';
                        if (conn.schemaNamespace !== 'App\\Schemas') label += ' [' + conn.schemaNamespace + ']';
                        opt.textContent = label;
                        select.appendChild(opt);
                    });
                    schemasDbConnection = data.default;
                    select.value = data.default;
                    loadDatabaseTables();
                })
                .catch(function(e) {
                    schemasDbConnection = null;
                    loadDatabaseTables();
                });
        }

        // ── Import from Database ────────────────────────
        function loadDatabaseTables() {
            var url = '/_schema-craft/api/database/tables';
            if (schemasDbConnection) url += '?db_connection=' + encodeURIComponent(schemasDbConnection);
            fetch(url)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    schemasState.tables = data.tables.map(function(t) {
                        t.selected = false;
                        return t;
                    });
                    renderTableList();
                })
                .catch(function(e) {
                    var list = document.getElementById('sc-table-list');
                    if (list) list.innerHTML = '<div style="color: var(--error); font-size: 13px; padding: 20px 0; text-align: center;">Failed to load tables: ' + escapeHtml(e.message) + '</div>';
                });
        }

        function renderTableList() {
            var list = document.getElementById('sc-table-list');
            if (!list || !schemasState.tables) return;

            var filtered = schemasState.tables.filter(function(t) {
                if (!schemasState.tableSearchQuery) return true;
                return t.name.toLowerCase().indexOf(schemasState.tableSearchQuery) !== -1 ||
                    t.modelName.toLowerCase().indexOf(schemasState.tableSearchQuery) !== -1;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div style="color: var(--text-muted); font-size: 13px; padding: 20px 0; text-align: center;">No tables found</div>';
                return;
            }

            list.innerHTML = filtered.map(function(t) {
                var schemaBadge = t.hasSchema ? '<span class="sc-mini-badge has">Schema</span>' : '';
                var modelBadge = t.hasModel ? '<span class="sc-mini-badge has">Model</span>' : '';
                return '<div class="sc-table-item">' +
                    '<input type="checkbox" class="sc-table-cb" data-table="' + escapeAttr(t.name) + '"' + (t.selected ? ' checked' : '') + '>' +
                    '<span class="sc-table-name">' + escapeHtml(t.name) + '</span>' +
                    '<span class="sc-table-badges">' + schemaBadge + modelBadge + '</span>' +
                '</div>';
            }).join('');

            // Bind checkbox events
            list.querySelectorAll('.sc-table-cb').forEach(function(cb) {
                cb.addEventListener('change', function() {
                    var tableName = cb.dataset.table;
                    var table = schemasState.tables.find(function(t) { return t.name === tableName; });
                    if (table) table.selected = cb.checked;
                });
            });
        }

        function toggleAllTables(select) {
            if (!schemasState.tables) return;
            var query = schemasState.tableSearchQuery;
            schemasState.tables.forEach(function(t) {
                var matches = !query ||
                    t.name.toLowerCase().indexOf(query) !== -1 ||
                    t.modelName.toLowerCase().indexOf(query) !== -1;
                if (matches) t.selected = select;
            });
            renderTableList();
        }

        function getSelectedTables() {
            if (!schemasState.tables) return [];
            return schemasState.tables.filter(function(t) { return t.selected; }).map(function(t) { return t.name; });
        }

        function doImportSchema(previewOnly) {
            var tables = getSelectedTables();
            if (tables.length === 0) {
                showToast('Please select at least one table', 'warning');
                return;
            }

            var createModel = document.getElementById('sc-import-model').checked;
            var force = document.getElementById('sc-import-force').checked;
            var url = previewOnly ? '/_schema-craft/api/schema/import/preview' : '/_schema-craft/api/schema/import';

            var body = { tables: tables, createModel: createModel };
            if (schemasDbConnection) body.db_connection = schemasDbConnection;
            if (!previewOnly) body.force = force;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(body),
            })
            .then(function(r) { return r.json(); })
            .then(function(result) {
                if (!result.success) {
                    showToast(result.message || 'Import failed', 'error');
                    return;
                }

                if (previewOnly) {
                    var pivotNote = result.pivots && result.pivots.length > 0
                        ? result.pivots.length + ' pivot table(s) detected and handled as relationships'
                        : '';
                    showFilePreviewModal(result.files, function() { doImportSchema(false); }, 'Write Files');
                    if (pivotNote) showToast(pivotNote, 'info');
                } else {
                    var s = result.summary || {};
                    var msg = (s.schemas || 0) + ' schema(s), ' + (s.models || 0) + ' model(s) created';
                    if (s.skipped > 0) msg += ', ' + s.skipped + ' skipped';
                    if (s.pivots > 0) msg += ', ' + s.pivots + ' pivot(s)';
                    showToast(msg, 'success');
                    loadDatabaseTables(); // Refresh statuses
                    refreshSchemaData();
                }
            })
            .catch(function(e) { showToast('Error: ' + e.message, 'error'); });
        }

        function refreshSchemaData() {
            fetch('/_schema-craft/api/schema')
                .then(function(r) { return r.json(); })
                .then(function(data) { schemaData = data; })
                .catch(function() {});
        }

        var statusInitialized = false;
        var statusData = null;

        function initStatusTab() {

                return;
            }
            statusInitialized = true;
            renderStatusTab();
            loadStatusData();

        function renderStatusTab() {
            var container = document.getElementById('status-tab');
            container.innerHTML =
                '<div class="summary-bar" id="status-summary">' +
                    '<div class="stat-card"><div class="stat-value" id="status-in-sync">-</div><div class="stat-label">In Sync</div></div>' +
                    '<div class="stat-card"><div class="stat-value" id="status-changes">-</div><div class="stat-label">Changes</div></div>' +
                    '<div class="stat-card"><div class="stat-value" id="status-new">-</div><div class="stat-label">New Tables</div></div>' +
                '</div>' +
                '<div class="sc-status-actions" id="status-actions">' +
                    '<span class="sc-status-count" id="status-total"></span>' +
                    '<button class="sc-btn sm" id="status-refresh">Refresh</button>' +
                    '<button class="sc-btn sm primary" id="status-generate-all">Generate All Migrations</button>' +
                    '<button class="sc-btn sm" id="status-generate-run">Generate &amp; Run</button>' +

                '<div class="sc-status-list" id="status-list"></div>';

                initStatusTab();
            });
            document.getElementById('status-generate-all').addEventListener('click', function() {
                doMigratePreviewAndWrite(false);
            });
            document.getElementById('status-generate-run').addEventListener('click', function() {

            });
